<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>دخول الإدارة - R7 Burger</title><style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(145deg,#fff7ed,#f8fafc);font-family:Tahoma,Arial,sans-serif;display:grid;place-items:center;color:#111827;padding:18px}.card{width:min(430px,100%);background:white;border:1px solid #eef0f4;border-radius:34px;padding:28px;box-shadow:0 18px 50px rgba(15,23,42,.1)}.logo{width:76px;height:76px;border-radius:24px;margin:0 auto 16px;background:linear-gradient(135deg,#ea580c,#fb923c);color:#fff;display:grid;place-items:center;font-size:28px;font-weight:900}.title{text-align:center;font-size:28px;font-weight:900;margin:0}.sub{text-align:center;color:#64748b;line-height:1.8;font-weight:700}.field{width:100%;padding:17px;border-radius:22px;border:1px solid #e5e7eb;background:#f8fafc;text-align:center;font-size:22px;font-weight:900;letter-spacing:3px;outline:none}.btn{width:100%;border:0;border-radius:22px;background:#ea580c;color:white;padding:16px;margin-top:14px;font-weight:900;font-size:17px;cursor:pointer;box-shadow:0 10px 25px rgba(234,88,12,.22)}.btn:disabled{opacity:.7}.msg{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.8;font-weight:800}.err{display:block;background:#fee2e2;color:#991b1b}.ok{display:block;background:#dcfce7;color:#166534}.hint{background:#fff7ed;color:#7c2d12;border:1px solid #fed7aa;border-radius:20px;padding:14px;line-height:1.8;font-size:13px;font-weight:800;margin-top:16px}.links{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap}.links a{color:#ea580c;text-decoration:none;font-weight:900}.spin{display:inline-block;width:18px;height:18px;border:3px solid #fed7aa;border-top-color:white;border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle;margin-left:8px}@keyframes spin{to{transform:rotate(360deg)}}
</style></head><body><main class="card"><div class="logo">R7</div><h1 class="title">دخول الإدارة</h1><p class="sub">المفتاح الافتراضي يعمل مباشرة: <b>0000</b></p><input id="key" class="field" placeholder="0000" autocomplete="off" autofocus><button id="go" class="btn">دخول</button><div id="msg" class="msg"></div><div class="hint">هذه النسخة لا تستخدم Firebase Auth نهائياً. البيانات والحفظ على Realtime Database من ملف <b>firebase.js</b>.</div><div class="links"><a href="firebase-check.html">فحص Firebase</a><a href="index.html">المنيو</a></div></main><script src="firebase.js"></script><script>
const $=id=>document.getElementById(id);const params=new URLSearchParams(location.search),next=params.get('next')||'admin.html';if(R7F.sessionIsValid()) location.href=next;function show(m,c='err'){$('msg').className='msg '+c;$('msg').textContent=m}async function login(){const key=$('key').value.trim();$('go').disabled=true;$('go').innerHTML='<span class="spin"></span>جاري الدخول';try{await R7F.validateAdminKey(key);show('تم الدخول بنجاح','ok');setTimeout(()=>location.href=next,300)}catch(e){show(R7F.errorMessage(e))}finally{$('go').disabled=false;$('go').textContent='دخول'}}$('go').onclick=login;$('key').onkeydown=e=>{if(e.key==='Enter')login()};
</script></body></html>
