<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>دخول الإدارة - R7 Burger</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>
:root{--brand:#f97316;--ink:#0f172a;--muted:#64748b;--line:#e5e7eb;--shadow:0 24px 70px rgba(15,23,42,.16)}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top right,#fed7aa 0,#fff7ed 24%,#f1f5f9 58%,#e0e7ff 100%);font-family:'Cairo',system-ui,Tahoma,Arial,sans-serif;color:var(--ink);padding:18px}button,input{font-family:inherit}.card{width:min(440px,100%);background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.8);border-radius:34px;box-shadow:var(--shadow);padding:28px}.logo{width:86px;height:86px;border-radius:30px;background:linear-gradient(135deg,var(--brand),#fb923c);color:#fff;font-size:32px;font-weight:900;display:grid;place-items:center;margin:0 auto 14px;box-shadow:0 18px 38px rgba(249,115,22,.25)}h1{text-align:center;margin:0 0 6px;font-size:28px}.sub{text-align:center;color:var(--muted);font-weight:800;margin-bottom:22px}.field{width:100%;border:1px solid var(--line);background:#f8fafc;border-radius:18px;padding:15px 16px;outline:none;font-weight:900;font-size:18px;text-align:center;letter-spacing:3px}.field:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(249,115,22,.12)}.btn{width:100%;border:0;border-radius:20px;padding:15px;background:var(--brand);color:#fff;font-weight:900;font-size:16px;cursor:pointer;margin-top:14px}.links{display:flex;gap:8px;margin-top:14px}.links a{flex:1;text-align:center;background:#fff;color:#475569;border:1px solid var(--line);border-radius:16px;padding:10px;text-decoration:none;font-weight:900}.msg{margin-top:14px;padding:12px;border-radius:16px;font-weight:900;text-align:center;display:none}.msg.err{display:block;background:#fee2e2;color:#991b1b}.msg.ok{display:block;background:#dcfce7;color:#166534}.note{margin-top:14px;color:#64748b;font-size:13px;font-weight:800;line-height:1.7;text-align:center}
</style></head><body><div class="card"><div class="logo">R7</div><h1>دخول الإدارة</h1><div class="sub">أدخل مفتاح الأدمن للوحة التحكم</div><input id="key" class="field" placeholder="••••" type="password" autocomplete="current-password"><button id="loginBtn" class="btn" onclick="login()">دخول</button><div id="msg" class="msg"></div><div class="links"><a href="firebase-check.html">فحص Firebase</a><a href="index.html">المنيو</a></div><div class="note">المفتاح الافتراضي: 0000. بعد أول دخول أنشئ مفتاحاً جديداً من لوحة الإدارة.</div></div><script src="firebase.js"></script><script>
const $=id=>document.getElementById(id);function msg(t,c){$('msg').textContent=t;$('msg').className='msg '+c}async function login(){try{$('loginBtn').disabled=true;msg('جاري التحقق...','ok');const session=await R7F.validateAdminKey($('key').value);msg('تم الدخول','ok');const next=new URLSearchParams(location.search).get('next')||'admin.html';setTimeout(()=>location.href=next,450)}catch(e){msg(R7F.errorMessage(e),'err')}finally{$('loginBtn').disabled=false}}$('key').addEventListener('keydown',e=>{if(e.key==='Enter')login()});if(R7F.sessionIsValid()){const next=new URLSearchParams(location.search).get('next')||'admin.html';location.href=next}
</script></body></html>
