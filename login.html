<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>دخول الإدارة</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>:root{--brand:#EA580B}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,#fed7aa,#fff7ed 28%,#f8fafc);font-family:'Cairo',Tahoma,Arial,sans-serif;color:#0f172a;padding:18px}.card{width:min(440px,100%);background:#fff;border:1px solid #e5e7eb;border-radius:34px;box-shadow:0 24px 70px rgba(15,23,42,.14);padding:28px}.logo{width:86px;height:86px;border-radius:30px;background:var(--brand);color:#fff;font-size:32px;font-weight:900;display:grid;place-items:center;margin:0 auto 14px}h1{text-align:center;margin:0 0 6px}.sub{text-align:center;color:#64748b;font-weight:800;margin-bottom:22px}.field{width:100%;border:1px solid #e5e7eb;background:#f8fafc;border-radius:18px;padding:15px;outline:none;font-weight:900;font-size:18px;text-align:center;letter-spacing:3px}.btn{width:100%;border:0;border-radius:20px;padding:15px;background:var(--brand);color:#fff;font-weight:900;font-size:16px;cursor:pointer;margin-top:14px}.links{display:flex;gap:8px;margin-top:14px}.links a{flex:1;text-align:center;background:#fff;color:#475569;border:1px solid #e5e7eb;border-radius:16px;padding:10px;text-decoration:none;font-weight:900}.msg{margin-top:14px;padding:12px;border-radius:16px;font-weight:900;text-align:center;display:none}.msg.err{display:block;background:#fee2e2;color:#991b1b}.msg.ok{display:block;background:#dcfce7;color:#166534}.note{margin-top:14px;color:#64748b;font-size:13px;font-weight:800;line-height:1.7;text-align:center}</style></head><body><div class="card"><div class="logo">R7</div><h1>دخول الإدارة</h1><div class="sub">أدخل مفتاح الأدمن</div><input id="key" class="field" placeholder="••••" type="password"><button id="loginBtn" class="btn" onclick="login()">دخول</button><div id="msg" class="msg"></div><div class="links"><a href="firebase-check.html">فحص Firebase</a><a href="index.html">المنيو</a></div><div class="note">المفتاح الافتراضي: 0000. بعد الدخول أنشئ مفتاح جديد من لوحة الإدارة.</div></div><script src="firebase.js"></script><script>const $=id=>document.getElementById(id);function msg(t,c){$('msg').textContent=t;$('msg').className='msg '+c}async function login(){try{$('loginBtn').disabled=true;msg('جاري التحقق...','ok');await R7F.validateAdminKey($('key').value);msg('تم الدخول','ok');const next=new URLSearchParams(location.search).get('next')||'admin.html';setTimeout(()=>location.href=next,350)}catch(e){msg(R7F.errorMessage(e),'err')}finally{$('loginBtn').disabled=false}}$('key').addEventListener('keydown',e=>{if(e.key==='Enter')login()});if(R7F.sessionIsValid()){location.href=new URLSearchParams(location.search).get('next')||'admin.html'}</script></body></html>
