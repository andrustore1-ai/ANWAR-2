<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>الطاولات و QR - R7 Burger</title><style>
*{box-sizing:border-box}body{margin:0;background:#eef1f6;color:#111827;font-family:Tahoma,Arial,sans-serif}button,input{font:inherit}button{cursor:pointer;border:0}.app{max-width:1050px;min-height:100vh;margin:auto;background:#f8fafc}.top{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #eef0f4;padding:14px;display:flex;justify-content:space-between;align-items:center;gap:12px}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,#ea580c,#fb923c);color:#fff;display:grid;place-items:center;font-weight:900;font-size:20px}h1{font-size:22px;margin:0;font-weight:900}.sub{font-size:12px;color:#64748b;font-weight:800;line-height:1.6}.nav{display:flex;gap:8px;overflow:auto;padding:12px 14px;background:#fff;border-bottom:1px solid #eef0f4}.nav a,.nav button{white-space:nowrap;text-decoration:none;background:#fff7ed;color:#9a3412;padding:11px 14px;border-radius:16px;font-weight:900}.wrap{padding:16px;display:grid;gap:16px}.card{background:#fff;border:1px solid #eef0f4;border-radius:28px;padding:18px;box-shadow:0 18px 45px rgba(15,23,42,.07)}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.field{width:100%;border:1px solid #e5e7eb;background:#f8fafc;border-radius:17px;padding:13px;margin:7px 0 12px;outline:none}.primary{border-radius:17px;padding:13px 16px;background:#ea580c;color:#fff;font-weight:900;box-shadow:0 8px 20px rgba(234,88,12,.18)}.secondary{border-radius:17px;padding:13px 16px;background:#111827;color:#fff;font-weight:900}.danger{border-radius:14px;padding:10px 12px;background:#fee2e2;color:#991b1b;font-weight:900}.ghost{border-radius:14px;padding:10px 12px;background:#f3f4f6;color:#111827;font-weight:900}.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}.tableCard{border:1px solid #eef0f4;border-radius:24px;background:#fff;padding:16px;display:grid;gap:12px}.qr{width:160px;height:160px;border-radius:18px;border:1px solid #eef0f4;padding:8px;background:#fff;margin:auto}.mono{direction:ltr;text-align:left;background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:10px;overflow:auto;font-family:monospace;font-size:12px}.actions{display:flex;gap:8px;flex-wrap:wrap}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;max-width:620px;width:calc(100% - 34px);padding:16px;border-radius:20px;background:#111827;color:white;font-weight:900;text-align:center;display:none;line-height:1.8}.toast.show{display:block}.toast.err{background:#b91c1c}.toast.ok{background:#047857}.alert{padding:14px;border-radius:18px;margin-bottom:12px;font-weight:800;line-height:1.8;background:#fee2e2;color:#991b1b}.hidden{display:none}@media(max-width:760px){.grid{grid-template-columns:1fr}.wrap{padding:12px}.card{border-radius:24px}}@media print{body{background:#fff}.top,.nav,.formCard,.actions,.toast,#err{display:none!important}.app{max-width:none;background:#fff}.list{grid-template-columns:repeat(2,1fr)}.tableCard{break-inside:avoid;box-shadow:none}.mono{font-size:10px}}
</style></head><body><div id="toast" class="toast"></div><div class="app"><header class="top"><div class="brand"><div class="logo">R7</div><div><h1>الطاولات و QR</h1><div class="sub">توليد طاولات وحفظها في Firebase مع رابط منيو مختلف لكل طاولة</div></div></div><button class="danger" onclick="R7F.logout()">خروج</button></header><nav class="nav"><a href="admin.html">الإدارة</a><a href="kitchen.html">المطبخ</a><a href="reports.html">التقارير</a><button id="printAll">طباعة الكل</button></nav><main class="wrap"><div id="err" class="alert hidden"></div><section class="card formCard"><h2>إضافة طاولة واحدة</h2><div class="grid"><input id="tableNo" class="field" placeholder="رقم الطاولة مثل 1"><input id="tableName" class="field" placeholder="اسم اختياري"><button id="addTable" class="primary">إضافة وحفظ</button></div></section><section class="card formCard"><h2>توليد طاولات دفعة واحدة</h2><div class="grid"><input id="fromNo" class="field" type="number" value="1" placeholder="من"><input id="toNo" class="field" type="number" value="10" placeholder="إلى"><button id="generate" class="secondary">توليد وحفظ الطاولات</button></div></section><section class="card"><h2>قائمة الطاولات</h2><div id="tablesList" class="list"></div></section></main></div><script src="firebase.js"></script><script>
if(!R7F.requireAdmin()) throw new Error('login');const $=id=>document.getElementById(id),esc=R7F.escapeHtml;let settings={...R7F.FALLBACK_SETTINGS},tables=[];function toast(m,t='') {const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3500)}function showErr(e){$('err').textContent=R7F.errorMessage(e);$('err').classList.remove('hidden')}function tableUrl(t){const base=R7F.menuBaseUrl(settings),sep=base.includes('?')?'&':'?';return base+sep+'table='+encodeURIComponent(t.no)+'&tid='+encodeURIComponent(t.id)}function render(){tables.sort((a,b)=>Number(a.no||0)-Number(b.no||0));$('tablesList').innerHTML=tables.map(t=>{const link=tableUrl(t);return `<div class="tableCard"><h3 style="margin:0;font-size:22px">طاولة ${esc(t.no)}</h3><div class="sub">${esc(t.name||'')}</div><img class="qr" src="${R7F.qrUrl(link)}"><div class="mono">${esc(link)}</div><div class="actions"><button class="ghost" onclick="copyLink('${encodeURIComponent(link)}')">نسخ الرابط</button><button class="secondary" onclick="printOne('${esc(t.id)}')">طباعة</button><button class="danger" onclick="delTable('${esc(t.id)}')">حذف</button></div></div>`}).join('')||'<div class="sub">لا توجد طاولات بعد.</div>'}async function saveTable(no,name){const id='table_'+R7F.sanitizeId(no);await R7F.set('tables/'+id,{no:String(no),name:name||'',active:true,createdAt:R7F.now(),updatedAt:R7F.now()});return id}$('addTable').onclick=async()=>{const no=$('tableNo').value.trim();if(!no)return toast('اكتب رقم الطاولة','err');try{await saveTable(no,$('tableName').value.trim());$('tableNo').value='';$('tableName').value='';toast('تم حفظ الطاولة في Firebase','ok')}catch(e){showErr(e);toast(R7F.errorMessage(e),'err')}};$('generate').onclick=async()=>{let a=Number($('fromNo').value||1),b=Number($('toNo').value||1);if(b<a)[a,b]=[b,a];if(b-a>200)return toast('الحد الأعلى 200 طاولة في المرة الواحدة','err');try{for(let i=a;i<=b;i++)await saveTable(i,'طاولة '+i);toast('تم توليد وحفظ الطاولات من '+a+' إلى '+b,'ok')}catch(e){showErr(e);toast(R7F.errorMessage(e),'err')}};function copyLink(v){const link=decodeURIComponent(v);(navigator.clipboard?navigator.clipboard.writeText(link):Promise.reject()).then(()=>toast('تم نسخ الرابط','ok')).catch(()=>{prompt('انسخ الرابط:',link)})}function printOne(id){const t=tables.find(x=>x.id===id);if(!t)return;const link=tableUrl(t),w=open('','_blank');w.document.write(`<html dir="rtl"><head><title>طاولة ${esc(t.no)}</title><style>body{font-family:Tahoma;text-align:center;padding:20px}img{width:280px;height:280px}h1{font-size:34px}.link{direction:ltr;font-family:monospace;word-break:break-all;font-size:12px}</style></head><body><h1>${esc(settings.name||'R7 Burger')}</h1><h2>طاولة ${esc(t.no)}</h2><p>امسح الكود لفتح المنيو</p><img src="${R7F.qrUrl(link)}"><div class="link">${esc(link)}</div><script>setTimeout(()=>print(),700)<\/script></body></html>`);w.document.close()}async function delTable(id){if(!confirm('حذف الطاولة؟'))return;try{await R7F.remove('tables/'+id);toast('تم الحذف','ok')}catch(e){showErr(e)}}$('printAll').onclick=()=>print();window.copyLink=copyLink;window.printOne=printOne;window.delTable=delTable;R7F.ready().then(()=>{R7F.watch('settings',v=>{settings={...R7F.FALLBACK_SETTINGS,...(v||{})};render()},showErr);R7F.watch('tables',v=>{tables=R7F.list(v||{});render()},showErr)}).catch(showErr);render();
</script></body></html>
