<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>إدارة الطاولات - R7 Burger</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>
:root{--brand:#f97316;--ink:#0f172a;--muted:#64748b;--line:#e5e7eb;--soft:#f8fafc;--shadow:0 16px 42px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:#f1f5f9;color:var(--ink);font-family:'Cairo',system-ui,Tahoma,Arial,sans-serif}button,input{font-family:inherit}.wrap{width:min(1180px,100%);margin:auto;padding:20px 16px 100px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}.top h1{margin:0}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:16px;padding:11px 15px;background:var(--brand);color:#fff;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px}.btn.gray{background:#e2e8f0;color:#0f172a}.btn.red{background:#dc2626}.btn.green{background:#16a34a}.card{background:#fff;border:1px solid var(--line);border-radius:26px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.field{width:100%;border:1px solid var(--line);background:#f8fafc;border-radius:16px;padding:12px 13px;outline:none;font-weight:800}label{font-size:13px;color:#475569;font-weight:900}.tables{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.tableCard{background:#fff;border:1px solid var(--line);border-radius:26px;padding:14px;box-shadow:var(--shadow)}.tableCard h3{margin:0 0 6px}.muted{color:var(--muted);font-weight:800;font-size:13px;word-break:break-all}.qr{width:100%;aspect-ratio:1/1;background:#f8fafc;border-radius:18px;object-fit:contain;padding:10px;border:1px solid #e2e8f0}.pill{display:inline-flex;border-radius:999px;padding:5px 10px;font-weight:900;background:#dcfce7;color:#166534;font-size:12px}.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid #e5e7eb;padding:8px 8px calc(8px + env(safe-area-inset-bottom));display:none;z-index:60;justify-content:space-around}.bottom a{color:#64748b;text-decoration:none;font-weight:900;text-align:center;border-radius:18px;padding:8px 12px}.bottom a.active{background:#fff7ed;color:var(--brand)}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;max-width:520px;width:calc(100% - 30px);padding:15px 18px;border-radius:20px;background:#111827;color:#fff;font-weight:900;text-align:center;display:none;line-height:1.8}.toast.show{display:block}.toast.err{background:#b91c1c}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}.tables{grid-template-columns:repeat(2,1fr)}.bottom{display:flex}.top{flex-direction:column;align-items:flex-start}}@media(max-width:560px){.grid,.tables{grid-template-columns:1fr}.card{padding:14px}.top h1{font-size:24px}.actions .btn{flex:1;justify-content:center}.actions{width:100%}}@media print{body{background:#fff}.top,.card.form,.actions,.bottom{display:none!important}.wrap{padding:0}.tables{grid-template-columns:repeat(2,1fr)}.tableCard{box-shadow:none;break-inside:avoid}}
</style></head><body><div id="toast" class="toast"></div><div class="wrap"><div class="top"><div><h1>إدارة الطاولات و QR</h1><div class="muted">كل طاولة لها رابط منيو مختلف مثل index.html?table=1</div></div><div class="actions"><a class="btn gray" href="admin.html">الإدارة</a><a class="btn green" href="kitchen.html">المطبخ</a><button class="btn" onclick="window.print()">طباعة QR</button></div></div><div class="card form"><h2>توليد الطاولات</h2><div class="grid"><div><label>من رقم</label><input id="from" type="number" class="field" value="1"></div><div><label>إلى رقم</label><input id="to" type="number" class="field" value="10"></div><div><label>بادئة اختيارية</label><input id="prefix" class="field" placeholder="مثال: A"></div><div><label>رابط المنيو العام</label><input id="baseUrl" class="field" placeholder="يؤخذ من الإعدادات تلقائياً"></div></div><div class="actions" style="margin-top:12px"><button class="btn" onclick="generateBatch()"><span id="plusIcon"></span>توليد وحفظ</button><button class="btn gray" onclick="loadTables()">تحديث</button><button class="btn red" onclick="deleteAllTables()">حذف كل الطاولات</button></div></div><div id="tables" class="tables"></div></div><nav class="bottom"><a href="admin.html"><span id="homeIcon"></span><br>الإدارة</a><a class="active" href="tables.html"><span id="tableIcon"></span><br>الطاولات</a><a href="kitchen.html"><span id="kitchenIcon"></span><br>المطبخ</a><a href="reports.html"><span id="reportsIcon"></span><br>تقارير</a></nav><script src="firebase.js"></script><script>
if(!R7F.requireAdmin()) throw new Error('login required');let settings={...R7F.FALLBACK_SETTINGS},tables={};const $=id=>document.getElementById(id);function toast(m,t=''){const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3500)}function esc(s){return R7F.escapeHtml(s)}function icons(){$('plusIcon').innerHTML=R7F.icon('plus',18);$('homeIcon').innerHTML=R7F.icon('home');$('tableIcon').innerHTML=R7F.icon('table');$('kitchenIcon').innerHTML=R7F.icon('kitchen');$('reportsIcon').innerHTML=R7F.icon('reports')}function base(){return $('baseUrl').value.trim()||R7F.menuBaseUrl(settings)}function linkFor(no){const u=base();return u+(u.includes('?')?'&':'?')+'table='+encodeURIComponent(no)}function render(){document.documentElement.style.setProperty('--brand',settings.themeColor||'#f97316');$('baseUrl').placeholder=R7F.menuBaseUrl(settings);const arr=R7F.list(tables).sort((a,b)=>String(a.number).localeCompare(String(b.number),'ar',{numeric:true}));$('tables').innerHTML=arr.map(t=>{const link=t.link||linkFor(t.number);return `<div class="tableCard"><div class="pill">طاولة ${esc(t.number)}</div><h3>${esc(t.label||'طاولة رقم '+t.number)}</h3><img class="qr" src="${R7F.qrUrl(link)}"><div class="muted">${esc(link)}</div><div class="actions" style="margin-top:10px"><button class="btn gray" onclick="copy('${encodeURIComponent(link)}')">نسخ</button><button class="btn red" onclick="deleteTable('${esc(t.id)}')">حذف</button></div></div>`}).join('')||'<div class="card">لا توجد طاولات. استخدم توليد وحفظ.</div>'}async function generateBatch(){try{const f=Number($('from').value||1),t=Number($('to').value||f),prefix=$('prefix').value.trim();if(t<f)return toast('رقم النهاية أصغر من البداية','err');const updates={};for(let i=f;i<=t;i++){const no=prefix+String(i);const id=R7F.sanitizeId(no);updates[id]={number:no,label:'طاولة رقم '+no,link:linkFor(no),active:true,createdAt:Date.now(),updatedAt:R7F.now()}}await R7F.update('tables',updates);toast('تم توليد وحفظ الطاولات')}catch(e){toast(R7F.errorMessage(e),'err')}}async function deleteTable(id){if(!confirm('حذف الطاولة؟'))return;try{await R7F.remove('tables/'+id);toast('تم الحذف')}catch(e){toast(R7F.errorMessage(e),'err')}}async function deleteAllTables(){if(!confirm('حذف جميع الطاولات؟'))return;try{await R7F.remove('tables');toast('تم حذف الطاولات')}catch(e){toast(R7F.errorMessage(e),'err')}}function copy(encoded){navigator.clipboard&&navigator.clipboard.writeText(decodeURIComponent(encoded));toast('تم نسخ الرابط')}function loadTables(){render()}icons();R7F.ready().then(()=>{R7F.watch('settings',v=>{settings={...R7F.FALLBACK_SETTINGS,...(v||{})};render()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('tables',v=>{tables=v||{};render()},e=>toast(R7F.errorMessage(e),'err'))}).catch(e=>toast(R7F.errorMessage(e),'err'));
</script></body></html>
