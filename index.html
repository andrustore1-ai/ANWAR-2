<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>R7 Burger - المنيو</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>
:root{--brand:#f97316;--brand2:#fb923c;--ink:#0f172a;--muted:#64748b;--line:#e5e7eb;--soft:#f8fafc;--card:#fff;--shadow:0 18px 45px rgba(15,23,42,.08)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:linear-gradient(135deg,#fff7ed 0,#f8fafc 28%,#eef2ff 100%);color:var(--ink);font-family:'Cairo',system-ui,-apple-system,'Segoe UI',Tahoma,Arial,sans-serif}button,input,textarea,select{font-family:inherit}.app{min-height:100vh;padding-bottom:96px}.shell{width:min(1180px,100%);margin:auto;padding:0 18px}.top{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.88);backdrop-filter:blur(16px);border-bottom:1px solid rgba(226,232,240,.8)}.topIn{height:76px;display:flex;align-items:center;justify-content:space-between;gap:16px}.miniBrand{display:flex;align-items:center;gap:12px}.miniLogo{width:48px;height:48px;border-radius:18px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;display:grid;place-items:center;font-weight:900;font-size:19px;box-shadow:0 12px 25px rgba(249,115,22,.25);overflow:hidden}.miniLogo img{width:100%;height:100%;object-fit:cover}.miniBrand b{font-size:20px}.miniBrand span{display:block;color:var(--muted);font-size:12px;font-weight:800}.iconBtn{border:0;background:#fff;color:var(--brand);width:50px;height:50px;border-radius:19px;display:grid;place-items:center;position:relative;cursor:pointer;box-shadow:0 10px 28px rgba(15,23,42,.08)}.badge{position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border:3px solid #fff;border-radius:999px;min-width:23px;height:23px;font-size:11px;display:grid;place-items:center;font-weight:900}.hero{padding:22px 0 8px}.profile{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding:18px}.profileLogo{width:96px;height:96px;border-radius:32px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;color:white;font-size:34px;font-weight:900;box-shadow:0 18px 45px rgba(249,115,22,.28);overflow:hidden}.profileLogo img{width:100%;height:100%;object-fit:cover}.profile h1{margin:6px 0 0;font-size:30px;line-height:1.1}.profile p{margin:0;color:var(--muted);font-weight:800}.socials{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;margin-top:8px}.socials a{width:42px;height:42px;border-radius:16px;background:#fff;color:var(--brand);display:grid;place-items:center;text-decoration:none;box-shadow:0 10px 28px rgba(15,23,42,.08);border:1px solid #fff}.banner{margin:10px 0 16px;border-radius:34px;min-height:220px;overflow:hidden;position:relative;box-shadow:var(--shadow);background:linear-gradient(135deg,var(--brand),var(--brand2))}.banner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.banner:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.55),rgba(0,0,0,.15),rgba(0,0,0,.45))}.bannerText{position:relative;z-index:2;color:#fff;padding:40px;max-width:620px}.bannerText h2{font-size:42px;margin:0 0 8px;font-weight:900}.bannerText p{margin:0;color:rgba(255,255,255,.88);font-size:16px;font-weight:800}.searchWrap{position:sticky;top:76px;z-index:35;background:rgba(248,250,252,.75);backdrop-filter:blur(14px);padding:12px 0;border-bottom:1px solid rgba(226,232,240,.65)}.searchBox{position:relative}.searchBox input{width:100%;border:1px solid rgba(226,232,240,.9);background:white;border-radius:28px;padding:18px 56px 18px 18px;outline:none;font-weight:800;font-size:15px;box-shadow:0 12px 30px rgba(15,23,42,.07)}.searchBox input:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(249,115,22,.11)}.searchBox .sicon{position:absolute;right:18px;top:17px;color:#94a3b8}.table{margin:14px 0;background:#ecfdf5;color:#047857;border:1px solid #a7f3d0;border-radius:20px;padding:12px 16px;font-weight:900;text-align:center}.content{display:grid;grid-template-columns:270px 1fr;gap:18px;padding:18px 0}.sideCats{position:sticky;top:156px;align-self:start;background:rgba(255,255,255,.82);border:1px solid rgba(226,232,240,.8);border-radius:30px;padding:14px;box-shadow:var(--shadow)}.sideCats h3{margin:0 0 12px}.catBtn{width:100%;border:0;background:#f8fafc;color:#475569;border-radius:19px;padding:13px 14px;margin-bottom:8px;font-weight:900;cursor:pointer;text-align:right;display:flex;align-items:center;gap:10px}.catBtn.active{background:var(--brand);color:#fff;box-shadow:0 10px 25px rgba(249,115,22,.23)}.products{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.card{background:white;border:1px solid rgba(226,232,240,.85);border-radius:30px;overflow:hidden;box-shadow:0 14px 35px rgba(15,23,42,.06);transition:.2s}.card:hover{transform:translateY(-3px);box-shadow:0 22px 50px rgba(15,23,42,.1)}.pic{height:190px;background:#f1f5f9;position:relative}.pic img{width:100%;height:100%;object-fit:cover}.info{padding:16px}.info h3{font-size:20px;margin:0 0 7px;font-weight:900}.desc{font-size:13px;color:var(--muted);line-height:1.7;font-weight:700;min-height:45px}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.price{font-size:20px;color:var(--brand);font-weight:900}.add{border:0;border-radius:18px;background:var(--brand);color:#fff;padding:12px 16px;font-weight:900;cursor:pointer;display:flex;align-items:center;gap:8px}.bottom{position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-top:1px solid #e5e7eb;padding:10px 16px calc(10px + env(safe-area-inset-bottom));display:none;justify-content:center;gap:10px}.bottom button{border:0;background:white;color:#94a3b8;border-radius:20px;padding:10px 22px;font-weight:900;cursor:pointer}.bottom button.active{background:#fff7ed;color:var(--brand)}.modal{position:fixed;inset:0;background:rgba(2,6,23,.58);z-index:90;display:none;align-items:flex-end;padding:0 12px}.modal.show{display:flex}.sheet{background:white;width:min(560px,100%);margin:auto auto 0;border-radius:34px 34px 0 0;padding:20px;max-height:90vh;overflow:auto;box-shadow:0 -20px 60px rgba(0,0,0,.22)}.cartItem{display:flex;gap:12px;border:1px solid #eef0f4;border-radius:22px;padding:10px;margin-bottom:10px;background:#fff}.cartItem img{width:82px;height:82px;border-radius:18px;object-fit:cover;background:#f1f5f9}.qty{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.qty button,.close,.danger{border:0;border-radius:14px;background:#f1f5f9;padding:9px 11px;font-weight:900;cursor:pointer}.danger{background:#fee2e2;color:#991b1b}.field{width:100%;border:1px solid #e5e7eb;background:#f8fafc;border-radius:18px;padding:13px;margin:6px 0 10px;outline:none;font-weight:800}.field:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(249,115,22,.09)}.submit{width:100%;border:0;border-radius:22px;background:var(--brand);color:#fff;padding:16px;font-weight:900;font-size:16px;cursor:pointer;margin-top:8px}.submit.alt{background:#16a34a}.submit.ghost{background:#fff;color:var(--brand);border:1px solid #fed7aa}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;max-width:520px;width:calc(100% - 30px);padding:15px 18px;border-radius:20px;background:#111827;color:#fff;font-weight:900;text-align:center;display:none;line-height:1.8}.toast.show{display:block}.toast.err{background:#b91c1c}.empty{text-align:center;color:#94a3b8;font-weight:900;padding:50px 12px;background:#fff;border-radius:28px;border:1px dashed #cbd5e1}.loader{padding:50px;text-align:center;color:#64748b;font-weight:900;background:#fff;border-radius:28px}.waCard{background:#fff7ed;border:1px solid #fed7aa;border-radius:22px;padding:14px 16px;margin-bottom:14px;display:flex;gap:12px;align-items:center;color:#9a3412;font-weight:800}.waCard span{display:block;color:#64748b;font-size:13px;line-height:1.6}@media(max-width:980px){.content{display:block}.sideCats{position:relative;top:auto;display:flex;gap:8px;overflow:auto;margin-bottom:14px;border-radius:0;background:transparent;border:0;box-shadow:none;padding:4px 0}.sideCats h3{display:none}.catBtn{width:auto;white-space:nowrap;margin:0}.products{grid-template-columns:repeat(2,minmax(0,1fr))}.bottom{display:flex}}@media(max-width:560px){.shell{padding:0 14px}.topIn{height:70px}.miniBrand b{font-size:18px}.miniBrand span{display:none}.profileLogo{width:88px;height:88px;border-radius:28px}.profile h1{font-size:26px}.banner{min-height:170px;border-radius:28px}.bannerText{padding:28px 22px}.bannerText h2{font-size:28px}.products{grid-template-columns:1fr;gap:14px}.pic{height:180px}.searchWrap{top:70px}.sideCats{top:142px}.app{padding-bottom:104px}}
</style></head><body><div id="toast" class="toast"></div><div class="app"><header class="top"><div class="shell topIn"><button class="iconBtn" onclick="openCart()"><span id="cartIcon"></span><span id="cartCount" class="badge">0</span></button><div class="miniBrand"><div id="miniLogo" class="miniLogo">R7</div><div><b id="miniName">R7 Burger</b><span id="miniSlogan">منيو ذكي</span></div></div><button class="iconBtn" onclick="openCart()"><span id="menuIcon"></span></button></div></header><section class="hero"><div class="shell"><div class="profile"><div id="profileLogo" class="profileLogo">R7</div><h1 id="name">R7 Burger</h1><p id="slogan">منيو ذكي للطلبات السريعة</p><div id="socials" class="socials"></div></div><div id="banner" class="banner"><img id="bannerImg" alt=""><div class="bannerText"><h2 id="bannerTitle">طعم البرجر الأصلي</h2><p id="bannerSubtitle">اطلب من الطاولة أو جهّز طلبك واتساب بسهولة</p></div></div><div id="tableBox" class="table" style="display:none"></div></div></section><section class="searchWrap"><div class="shell"><div class="searchBox"><span id="searchIcon" class="sicon"></span><input id="search" placeholder="ابحث عن وجبتك المفضلة..."></div></div></section><main class="shell content"><aside id="cats" class="sideCats"><h3>الأقسام</h3><button class="catBtn active">الكل</button></aside><section><div id="waBox" class="waCard"><span id="waIcon"></span><div><b>طلب خارج المطعم</b><span>يمكنك تجهيز الطلب ثم اختيار إرساله للمطبخ مباشرة أو إرساله واتساب.</span></div></div><div id="products" class="products"><div class="loader">جاري تحميل المنيو...</div></div></section></main><nav class="bottom"><button class="active"><span id="homeIcon"></span><br>المنيو</button><button onclick="openCart()"><span id="cartIcon2"></span><br>السلة</button></nav></div><div id="cartModal" class="modal"><div class="sheet"><div class="row"><h2 style="margin:0">سلة الطلبات</h2><button class="close" onclick="closeCart()">إغلاق</button></div><div id="cartItems" style="margin-top:16px"></div><div class="row" style="font-size:20px;font-weight:900;margin:15px 0"><span>المجموع</span><span id="total">0</span></div><input id="customer" class="field" placeholder="الاسم - اختياري"><input id="phone" class="field" placeholder="رقم الجوال - اختياري"><input id="tableInput" class="field" placeholder="رقم الطاولة / فارغ للطلبات الخارجية"><textarea id="note" class="field" placeholder="ملاحظات الطلب" rows="3"></textarea><button class="submit" onclick="submitOrder('kitchen')">إرسال للمطبخ مباشرة</button><button class="submit alt" onclick="submitOrder('whatsapp')">إرسال واتساب</button><button class="submit ghost" onclick="closeCart()">متابعة اختيار الأصناف</button></div></div><script src="firebase.js"></script><script>
let settings={...R7F.FALLBACK_SETTINGS},cats=R7F.list(R7F.FALLBACK_CATEGORIES),products=R7F.list(R7F.FALLBACK_PRODUCTS),selected='all',cart=[];const $=id=>document.getElementById(id),params=new URLSearchParams(location.search),table=params.get('table')||'';function toast(m,t='') {const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3600)}function esc(s){return R7F.escapeHtml(s)}function initIcons(){['cartIcon','cartIcon2'].forEach(id=>$(id).innerHTML=R7F.icon('cart'));$('menuIcon').innerHTML=R7F.icon('menu');$('searchIcon').innerHTML=R7F.icon('search');$('waIcon').innerHTML=R7F.icon('whatsapp',28);$('homeIcon').innerHTML=R7F.icon('home')}function initTable(){if(table){$('tableBox').style.display='block';$('tableBox').textContent='طلب على طاولة رقم: '+table;$('tableInput').value=table;$('tableInput').readOnly=true}}function renderLogo(el){if(settings.logoImage){el.innerHTML=`<img src="${esc(settings.logoImage)}" alt="logo">`}else{el.textContent=settings.logoText||'R7'}}function renderBrand(){document.documentElement.style.setProperty('--brand',settings.themeColor||'#f97316');$('miniName').textContent=settings.name||'R7 Burger';$('miniSlogan').textContent=settings.slogan||'';$('name').textContent=settings.name||'R7 Burger';$('slogan').textContent=settings.slogan||'';renderLogo($('miniLogo'));renderLogo($('profileLogo'));$('banner').style.display=settings.bannerEnabled===false?'none':'block';$('bannerImg').src=settings.bannerImage||'';$('bannerTitle').textContent=settings.bannerTitle||'';$('bannerSubtitle').textContent=settings.bannerSubtitle||'';const socials=R7F.list(settings.socials).filter(s=>s.active!==false&&s.url).sort(R7F.sortBySort);$('socials').innerHTML=socials.map(s=>`<a href="${esc(s.url)}" target="_blank" rel="noopener" title="${esc(s.label||s.type)}">${R7F.icon(s.type||'website')}</a>`).join('');$('waBox').style.display=settings.acceptOutsideOrders===false?'none':'flex'}function render(){renderBrand();cats=R7F.list(cats).filter(c=>c.active!==false).sort(R7F.sortBySort);products=R7F.list(products).filter(p=>p.active!==false).sort(R7F.sortBySort);$('cats').innerHTML='<h3>الأقسام</h3><button class="catBtn '+(selected==='all'?'active':'')+'" onclick="setCat(\'all\')">'+R7F.icon('products')+' الكل</button>'+cats.map(c=>`<button class="catBtn ${selected===c.id?'active':''}" onclick="setCat('${esc(c.id)}')">${R7F.icon(c.icon||'products')} ${esc(c.name)}</button>`).join('');renderProducts();renderCart()}function setCat(id){selected=id;render()}function renderProducts(){const q=$('search').value.trim().toLowerCase();const arr=products.filter(p=>(selected==='all'||p.categoryId===selected)&&(!q||String(p.name+' '+(p.description||'')).toLowerCase().includes(q)));$('products').innerHTML=arr.map(p=>`<div class="card"><div class="pic"><img src="${esc(p.image||'')}" onerror="this.style.display='none'"></div><div class="info"><h3>${esc(p.name)}</h3><div class="desc">${esc(p.description||'')}</div><div class="row"><span class="price">${R7F.money(p.price,settings.currency)}</span><button class="add" onclick="addCart('${esc(p.id)}')">${R7F.icon('plus',18)} إضافة</button></div></div></div>`).join('')||'<div class="empty">لا توجد أصناف مطابقة</div>'}function addCart(id){const p=products.find(x=>x.id===id);if(!p)return;const ex=cart.find(i=>i.id===id);if(ex)ex.qty++;else cart.push({id:p.id,name:p.name,price:Number(p.price||0),image:p.image||'',qty:1});renderCart();toast('تمت الإضافة للسلة')}function renderCart(){$('cartCount').textContent=cart.reduce((a,b)=>a+b.qty,0);$('cartItems').innerHTML=cart.map(i=>`<div class="cartItem"><img src="${esc(i.image)}" onerror="this.style.display='none'"><div style="flex:1"><b>${esc(i.name)}</b><div class="row"><span>${R7F.money(i.price*i.qty,settings.currency)}</span><div class="qty"><button onclick="qty('${esc(i.id)}',-1)">-</button><b>${i.qty}</b><button onclick="qty('${esc(i.id)}',1)">+</button><button class="danger" onclick="removeItem('${esc(i.id)}')">حذف</button></div></div></div></div>`).join('')||'<div class="empty">السلة فارغة</div>';$('total').textContent=R7F.money(cart.reduce((a,b)=>a+b.price*b.qty,0),settings.currency)}function qty(id,d){const i=cart.find(x=>x.id===id);if(!i)return;i.qty+=d;if(i.qty<=0)cart=cart.filter(x=>x.id!==id);renderCart()}function removeItem(id){cart=cart.filter(x=>x.id!==id);renderCart()}function openCart(){$('cartModal').classList.add('show');renderCart()}function closeCart(){$('cartModal').classList.remove('show')}function buildOrder(channel){const tbl=$('tableInput').value.trim();const total=cart.reduce((a,b)=>a+b.price*b.qty,0);return {orderNo:R7F.orderNo(),source:tbl?'table':'menu',channel:channel,routeKitchen:channel==='kitchen',table:tbl,customerName:$('customer').value.trim(),phone:$('phone').value.trim(),note:$('note').value.trim(),items:cart,total,status:channel==='kitchen'?'new':'whatsapp_sent',createdAt:R7F.now(),updatedAt:R7F.now(),deliveredAt:null}}function waText(order){const lines=[`طلب جديد ${order.orderNo}`,order.table?`الطاولة: ${order.table}`:'طلب خارجي',...cart.map(i=>`${i.name} x${i.qty} = ${i.price*i.qty} ${settings.currency}`),`المجموع: ${order.total} ${settings.currency}`,`الاسم: ${order.customerName||'-'}`,`الهاتف: ${order.phone||'-'}`,`ملاحظات: ${order.note||'-'}`];return encodeURIComponent(lines.join('\n'))}async function submitOrder(channel){if(!cart.length)return toast('السلة فارغة','err');const order=buildOrder(channel);try{await R7F.push('orders',order);if(channel==='whatsapp'){const phone=String(settings.whatsapp||'').replace(/\D/g,'');if(phone) window.open('https://wa.me/'+phone+'?text='+waText(order),'_blank');toast('تم حفظ الطلب وفتح واتساب')}else toast('تم إرسال الطلب للمطبخ');cart=[];renderCart();closeCart()}catch(e){toast(R7F.errorMessage(e),'err')}}$('search').oninput=renderProducts;initIcons();initTable();R7F.ready().then(()=>{R7F.watch('settings',v=>{settings={...R7F.FALLBACK_SETTINGS,...(v||{})};render()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('categories',v=>{cats=R7F.list(v||R7F.FALLBACK_CATEGORIES);render()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('products',v=>{products=R7F.list(v||R7F.FALLBACK_PRODUCTS);render()},e=>toast(R7F.errorMessage(e),'err'))}).catch(e=>toast(R7F.errorMessage(e),'err'));render();
</script></body></html>
