<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>R7 Burger - المنيو</title><style>
*{box-sizing:border-box}body{margin:0;background:#f3f4f6;color:#111827;font-family:Tahoma,Arial,sans-serif}.app{max-width:470px;min-height:100vh;margin:auto;background:#fff;position:relative;box-shadow:0 0 35px rgba(15,23,42,.08);padding-bottom:92px}.top{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid #eef0f4;padding:14px;display:flex;align-items:center;justify-content:space-between}.logo{width:54px;height:54px;border-radius:20px;background:linear-gradient(135deg,#ea580c,#fb923c);color:#fff;display:grid;place-items:center;font-weight:900;font-size:22px}.brand h1{margin:0;font-size:22px;font-weight:900}.brand p{margin:3px 0 0;color:#64748b;font-size:12px;font-weight:800}.iconBtn{border:0;background:#fff7ed;color:#ea580c;width:48px;height:48px;border-radius:18px;display:grid;place-items:center;position:relative;cursor:pointer}.badge{position:absolute;top:-5px;right:-5px;background:#dc2626;color:#fff;border-radius:999px;min-width:20px;height:20px;font-size:11px;display:grid;place-items:center;font-weight:900}.search{padding:14px;background:#fff}.search input{width:100%;border:0;background:#f1f5f9;border-radius:24px;padding:17px 48px 17px 16px;outline:none;font-weight:800}.searchBox{position:relative}.searchBox svg{position:absolute;right:17px;top:15px;color:#94a3b8}.table{margin:0 14px 12px;background:#dcfce7;color:#166534;border-radius:18px;padding:11px 14px;font-weight:900;text-align:center}.waCard{margin:12px 14px;background:#fff7ed;border:1px solid #fed7aa;border-radius:26px;padding:18px;display:flex;gap:12px;align-items:center}.waCard b{font-size:17px}.waCard span{display:block;color:#64748b;line-height:1.7;font-size:13px;font-weight:700}.cats{position:sticky;top:83px;z-index:20;display:flex;gap:8px;overflow:auto;padding:12px 14px;background:white;border-bottom:1px solid #eef0f4}.cats button{white-space:nowrap;border:0;border-radius:999px;padding:11px 18px;background:#f1f5f9;color:#475569;font-weight:900;cursor:pointer}.cats button.active{background:#ea580c;color:white;box-shadow:0 8px 18px rgba(234,88,12,.22)}.products{display:grid;gap:16px;padding:14px}.card{background:white;border:1px solid #eef0f4;border-radius:30px;overflow:hidden;box-shadow:0 12px 35px rgba(15,23,42,.06)}.pic{height:190px;background:#f1f5f9}.pic img{width:100%;height:100%;object-fit:cover}.info{padding:16px}.info h3{font-size:20px;margin:0 0 8px;font-weight:900}.desc{font-size:13px;color:#64748b;line-height:1.7;font-weight:700;min-height:34px}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.price{font-size:20px;color:#ea580c;font-weight:900}.add{border:0;border-radius:17px;background:#ea580c;color:#fff;padding:12px 16px;font-weight:900;cursor:pointer}.bottom{position:fixed;bottom:0;left:0;right:0;max-width:470px;margin:auto;background:white;border-top:1px solid #eef0f4;padding:10px 16px;display:flex;gap:10px;justify-content:space-around;z-index:50}.bottom button{border:0;background:white;color:#94a3b8;border-radius:20px;padding:10px 20px;font-weight:900;cursor:pointer}.bottom button.active{background:#fff7ed;color:#ea580c}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:80;display:none;align-items:flex-end}.modal.show{display:flex}.sheet{background:white;width:min(470px,100%);margin:auto;border-radius:34px 34px 0 0;padding:20px;max-height:88vh;overflow:auto}.cartItem{display:flex;gap:12px;border:1px solid #eef0f4;border-radius:20px;padding:10px;margin-bottom:10px}.cartItem img{width:74px;height:74px;border-radius:16px;object-fit:cover;background:#f1f5f9}.qty{display:flex;gap:8px;align-items:center}.qty button,.close,.danger{border:0;border-radius:12px;background:#f1f5f9;padding:8px 10px;font-weight:900;cursor:pointer}.danger{background:#fee2e2;color:#991b1b}.field{width:100%;border:1px solid #e5e7eb;background:#f8fafc;border-radius:18px;padding:13px;margin:6px 0 10px;outline:none}.submit{width:100%;border:0;border-radius:22px;background:#ea580c;color:#fff;padding:16px;font-weight:900;font-size:16px;cursor:pointer}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;max-width:440px;width:calc(100% - 30px);padding:15px 18px;border-radius:20px;background:#111827;color:#fff;font-weight:900;text-align:center;display:none;line-height:1.8}.toast.show{display:block}.toast.err{background:#b91c1c}.empty{text-align:center;color:#94a3b8;font-weight:900;padding:40px 12px}.loader{padding:40px;text-align:center;color:#64748b;font-weight:900}@media(max-width:480px){.pic{height:170px}.brand h1{font-size:20px}}
</style></head><body><div id="toast" class="toast"></div><div class="app"><header class="top"><button class="iconBtn" onclick="openCart()"><svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"></path></svg><span id="cartCount" class="badge">0</span></button><div class="brand" style="text-align:center"><h1 id="name">R7 Burger</h1><p id="slogan">نظام المنيو الذكي</p></div><div class="logo">R7</div></header><div class="search"><div class="searchBox"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg><input id="search" placeholder="ابحث عن وجبتك المفضلة..."></div></div><div id="tableBox" class="table" style="display:none"></div><div id="waBox" class="waCard"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#ea580c" stroke-width="2"><path d="M21 11.5a8.4 8.4 0 0 1-12.4 7.4L3 21l2.1-5.4A8.5 8.5 0 1 1 21 11.5Z"></path></svg><div><b>طلب خارج المطعم</b><span>يمكنك تجهيز الطلب وإرساله واتساب، وسيتم حفظه في التقارير.</span></div></div><div id="cats" class="cats"><button class="active">الكل</button></div><div id="products" class="products"><div class="loader">جاري تحميل المنيو...</div></div><nav class="bottom"><button class="active"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2z"></path></svg><br>المنيو</button><button onclick="openCart()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"></path></svg><br>السلة</button></nav></div><div id="cartModal" class="modal"><div class="sheet"><div class="row"><h2 style="margin:0">سلة الطلبات</h2><button class="close" onclick="closeCart()">إغلاق</button></div><div id="cartItems" style="margin-top:16px"></div><div class="row" style="font-size:20px;font-weight:900;margin:15px 0"><span>المجموع</span><span id="total">0</span></div><input id="customer" class="field" placeholder="الاسم - اختياري"><input id="phone" class="field" placeholder="رقم الجوال - اختياري"><input id="tableInput" class="field" placeholder="رقم الطاولة"><textarea id="note" class="field" placeholder="ملاحظات الطلب" rows="3"></textarea><button class="submit" onclick="submitOrder()">إرسال الطلب</button></div></div><script src="firebase.js"></script><script>
let settings={...R7F.FALLBACK_SETTINGS},cats=R7F.list(R7F.FALLBACK_CATEGORIES),products=R7F.list(R7F.FALLBACK_PRODUCTS),selected='all',cart=[];const $=id=>document.getElementById(id),params=new URLSearchParams(location.search),table=params.get('table')||'';function toast(m,t='') {const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3500)}function esc(s){return R7F.escapeHtml(s)}function initTable(){if(table){$('tableBox').style.display='block';$('tableBox').textContent='طلب على طاولة رقم: '+table;$('tableInput').value=table;$('tableInput').readOnly=true}}function render(){ $('name').textContent=settings.name||'R7 Burger'; $('slogan').textContent=settings.slogan||''; $('waBox').style.display=settings.acceptOutsideOrders===false?'none':'flex';cats=cats.filter(c=>c.active!==false).sort(R7F.sortBySort);products=products.filter(p=>p.active!==false).sort(R7F.sortBySort);$('cats').innerHTML='<button class="'+(selected==='all'?'active':'')+'" onclick="setCat(\'all\')">الكل</button>'+cats.map(c=>`<button class="${selected===c.id?'active':''}" onclick="setCat('${esc(c.id)}')">${esc(c.name)}</button>`).join('');renderProducts();renderCart()}function setCat(id){selected=id;render()}function renderProducts(){const q=$('search').value.trim().toLowerCase();const arr=products.filter(p=>(selected==='all'||p.categoryId===selected)&&(!q||String(p.name+' '+(p.description||'')).toLowerCase().includes(q)));$('products').innerHTML=arr.map(p=>`<div class="card"><div class="pic"><img src="${esc(p.image||'')}" onerror="this.style.display='none'"></div><div class="info"><h3>${esc(p.name)}</h3><div class="desc">${esc(p.description||'')}</div><div class="row"><span class="price">${R7F.money(p.price,settings.currency)}</span><button class="add" onclick="addCart('${esc(p.id)}')">إضافة</button></div></div></div>`).join('')||'<div class="empty">لا توجد أصناف مطابقة</div>'}function addCart(id){const p=products.find(x=>x.id===id);if(!p)return;const ex=cart.find(i=>i.id===id);if(ex)ex.qty++;else cart.push({id:p.id,name:p.name,price:Number(p.price||0),image:p.image||'',qty:1});renderCart();toast('تمت الإضافة للسلة')}function renderCart(){$('cartCount').textContent=cart.reduce((a,b)=>a+b.qty,0);$('cartItems').innerHTML=cart.map(i=>`<div class="cartItem"><img src="${esc(i.image)}" onerror="this.style.display='none'"><div style="flex:1"><b>${esc(i.name)}</b><div class="row"><span>${R7F.money(i.price*i.qty,settings.currency)}</span><div class="qty"><button onclick="qty('${esc(i.id)}',-1)">-</button><b>${i.qty}</b><button onclick="qty('${esc(i.id)}',1)">+</button><button class="danger" onclick="removeItem('${esc(i.id)}')">حذف</button></div></div></div></div>`).join('')||'<div class="empty">السلة فارغة</div>';$('total').textContent=R7F.money(cart.reduce((a,b)=>a+b.price*b.qty,0),settings.currency)}function qty(id,d){const i=cart.find(x=>x.id===id);if(!i)return;i.qty+=d;if(i.qty<=0)cart=cart.filter(x=>x.id!==id);renderCart()}function removeItem(id){cart=cart.filter(x=>x.id!==id);renderCart()}function openCart(){$('cartModal').classList.add('show');renderCart()}function closeCart(){$('cartModal').classList.remove('show')}async function submitOrder(){if(!cart.length)return toast('السلة فارغة','err');const total=cart.reduce((a,b)=>a+b.price*b.qty,0),tbl=$('tableInput').value.trim();const order={orderNo:R7F.orderNo(),source:tbl?'table':'whatsapp',table:tbl,customerName:$('customer').value.trim(),phone:$('phone').value.trim(),note:$('note').value.trim(),items:cart,total,status:'new',createdAt:R7F.now(),updatedAt:R7F.now()};try{await R7F.push('orders',order);toast('تم إرسال الطلب للمطبخ');if(!tbl&&settings.whatsapp){const txt=`طلب جديد ${order.orderNo}%0A${cart.map(i=>`${i.name} x${i.qty} = ${i.price*i.qty}`).join('%0A')}%0Aالمجموع: ${total} ${settings.currency}%0Aالاسم: ${order.customerName}%0Aالهاتف: ${order.phone}%0Aملاحظات: ${order.note}`;window.open('https://wa.me/'+settings.whatsapp+'?text='+txt,'_blank')}cart=[];renderCart();closeCart()}catch(e){toast(R7F.errorMessage(e),'err')}}$('search').oninput=renderProducts;initTable();R7F.ready().then(()=>{R7F.watch('settings',v=>{settings={...R7F.FALLBACK_SETTINGS,...(v||{})};render()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('categories',v=>{cats=R7F.list(v||R7F.FALLBACK_CATEGORIES);render()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('products',v=>{products=R7F.list(v||R7F.FALLBACK_PRODUCTS);render()},e=>toast(R7F.errorMessage(e),'err'))}).catch(e=>toast(R7F.errorMessage(e),'err'));render();
</script></body></html>
