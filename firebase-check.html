<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>فحص Firebase</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"><style>body{font-family:Cairo,Tahoma,Arial;background:#f8fafc;margin:0;padding:20px;color:#0f172a}.card{max-width:760px;margin:auto;background:#fff;border:1px solid #e5e7eb;border-radius:28px;padding:20px;box-shadow:0 16px 42px rgba(15,23,42,.08)}button{border:0;border-radius:16px;background:#EA580B;color:#fff;padding:12px 16px;font-weight:900;margin:6px;cursor:pointer}pre{background:#0f172a;color:#e2e8f0;border-radius:18px;padding:16px;white-space:pre-wrap;direction:ltr;text-align:left}.ok{color:#166534}.err{color:#991b1b}</style></head><body><div class="card"><h1>فحص Firebase Realtime Database</h1><p>هذه الصفحة لا تستخدم Firebase Auth نهائياً.</p><button onclick="check()">تشغيل الفحص</button><button onclick="init()">تهيئة البيانات الأساسية بدون منتجات افتراضية</button><button onclick="clean()">حذف الافتراضيات القديمة</button><a href="login.html"><button>دخول الإدارة</button></a><pre id="out">جاهز...</pre></div><script src="firebase.js"></script><script>const out=document.getElementById('out');function log(x){out.textContent+='\n'+x}async function check(){out.textContent='بدء الفحص...';try{await R7F.ready();log('✅ تم تحميل Firebase SDK');await R7F.set('health/check',{ok:true,time:Date.now()});log('✅ تم اختبار الكتابة');const v=await R7F.get('health/check');log('✅ تم اختبار القراءة: '+JSON.stringify(v));log('✅ الاتصال يعمل')}catch(e){log('❌ '+R7F.errorMessage(e))}}async function init(){out.textContent='تهيئة...';try{await R7F.ensureBaseData();log('✅ تمت التهيئة: إعدادات فارغة + مفتاح 0000 فقط، بدون منتجات أو أقسام افتراضية')}catch(e){log('❌ '+R7F.errorMessage(e))}}async function clean(){out.textContent='تنظيف...';try{await R7F.cleanDemoData();log('✅ تم حذف الافتراضيات القديمة وتصفير الإعدادات')}catch(e){log('❌ '+R7F.errorMessage(e))}}</script></body></html>
