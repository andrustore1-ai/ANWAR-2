<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>فحص Firebase</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;background:#f1f5f9;color:#0f172a;font-family:'Cairo',system-ui,Tahoma,Arial,sans-serif;padding:18px}.wrap{width:min(760px,100%);margin:auto}.card{background:#fff;border:1px solid #e5e7eb;border-radius:26px;padding:18px;box-shadow:0 16px 42px rgba(15,23,42,.08);margin-bottom:12px}.btn{border:0;border-radius:16px;padding:12px 16px;background:#f97316;color:#fff;font-weight:900;cursor:pointer;margin:4px}.btn.gray{background:#e2e8f0;color:#0f172a}.log{background:#0f172a;color:#e2e8f0;border-radius:18px;padding:14px;font-weight:800;line-height:1.9;white-space:pre-wrap;min-height:160px}a{color:#f97316;font-weight:900}</style></head><body><div class="wrap"><div class="card"><h1>فحص Firebase - Realtime Database</h1><p>هذه الصفحة لا تستخدم Firebase Auth ولا Firestore. فقط Realtime Database.</p><button class="btn" onclick="check()">تشغيل الفحص</button><button class="btn" onclick="seed()">تهيئة البيانات</button><a class="btn gray" href="login.html">تسجيل الدخول</a><a class="btn gray" href="admin.html">الإدارة</a></div><div id="log" class="log">جاهز للفحص...</div></div><script src="firebase.js"></script><script>
const log=document.getElementById('log');function line(t){log.textContent+='\n'+t}async function check(){log.textContent='بدء الفحص...';try{await R7F.ready();line('✅ تم تحميل Firebase SDK');line('✅ المشروع: '+R7F.firebaseConfig.projectId);line('✅ databaseURL: '+R7F.firebaseConfig.databaseURL);await R7F.set('healthCheck',{ok:true,at:Date.now()});line('✅ تم اختبار الكتابة في Realtime Database');const v=await R7F.get('healthCheck');line(v&&v.ok?'✅ تم اختبار القراءة بنجاح':'⚠️ القراءة رجعت فارغة');line('✅ الفحص انتهى بنجاح')}catch(e){line('❌ '+R7F.errorMessage(e));line('\nالحل غالباً: انسخ database.rules.txt داخل Firebase Console > Realtime Database > Rules ثم Publish.')}}async function seed(){try{await R7F.ensureSeedData();line('✅ تمت تهيئة الإعدادات والأقسام والمنتجات والمفتاح الافتراضي')}catch(e){line('❌ '+R7F.errorMessage(e))}}
</script></body></html>
