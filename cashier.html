<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>الكاشير</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>
:root{--brand:#EA580B;--ink:#0f172a;--muted:#64748b;--line:#e5e7eb;--shadow:0 16px 42px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:#f8fafc;color:var(--ink);font-family:'Cairo',Tahoma,Arial,sans-serif}button,input{font-family:inherit}.wrap{width:min(1280px,100%);margin:auto;padding:18px 16px 110px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.top h1{margin:0}.grid{display:grid;grid-template-columns:1fr 380px;gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:16px;box-shadow:var(--shadow)}.search{width:100%;border:1px solid var(--line);border-radius:22px;padding:14px 16px;outline:none;font-weight:900;margin-bottom:12px}.cats{display:flex;gap:8px;overflow:auto;margin-bottom:12px}.cat{border:0;border-radius:16px;background:#f1f5f9;color:#334155;padding:10px 14px;font-weight:900;white-space:nowrap}.cat.active{background:var(--brand);color:white}.products{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.prod{border:1px solid var(--line);background:#fff;border-radius:22px;padding:12px;text-align:right;cursor:pointer}.prodImg{height:120px;border-radius:18px;background:#f1f5f9;display:grid;place-items:center;overflow:hidden;color:#cbd5e1}.prodImg img{width:100%;height:100%;object-fit:cover}.prod h3{margin:10px 0 4px}.price{font-weight:900;color:var(--brand)}.cartItem,.row{display:flex;justify-content:space-between;align-items:center;gap:10px}.cartItem{border-bottom:1px dashed #e2e8f0;padding:10px 0}.qty{display:flex;gap:8px;align-items:center}.qty button{width:32px;height:32px;border:0;border-radius:12px;background:#f1f5f9;font-weight:900}.btn{border:0;border-radius:17px;background:var(--brand);color:#fff;padding:12px 16px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px}.btn.gray{background:#f1f5f9;color:#334155}.btn.green{background:#16a34a}.btn.red{background:#fee2e2;color:#991b1b}.actions{display:flex;gap:8px;flex-wrap:wrap}.field{width:100%;border:1px solid var(--line);background:#f8fafc;border-radius:16px;padding:12px;outline:none;font-weight:800}.invoice{width:280px;background:#fff;color:#111;padding:12px;border:1px solid #ddd;font-family:'Cairo',Tahoma,Arial}.invoice .center{text-align:center}.invoice .line{border-top:1px dashed #999;margin:8px 0}.invoice .irow{display:flex;justify-content:space-between;gap:8px;padding:4px 0}.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom));display:none;z-index:60;justify-content:space-around}.bottom a{color:#64748b;text-decoration:none;font-weight:900;text-align:center;border-radius:16px;padding:8px}.bottom .active{background:#fff7ed;color:var(--brand)}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;width:min(520px,calc(100% - 28px));padding:14px;border-radius:18px;background:#111827;color:white;font-weight:900;text-align:center;display:none}.toast.show{display:block}.toast.err{background:#b91c1c}@media(max-width:1050px){.grid{grid-template-columns:1fr}.products{grid-template-columns:repeat(2,1fr)}.bottom{display:flex}}@media(max-width:560px){.products{grid-template-columns:1fr}.top{align-items:flex-start}}
</style></head><body><div id="toast" class="toast"></div><div class="wrap"><div class="top"><div><h1>قسم الكاشير</h1><div style="color:#64748b;font-weight:800">للزبائن المباشرين: اختر الأصناف ثم اطبع أو احفظ الفاتورة كصورة</div></div><div class="actions"><a class="btn gray" href="admin.html">الإدارة</a><a class="btn gray" href="reports.html">الفواتير</a></div></div><div class="grid"><section class="card"><input id="search" class="search" placeholder="بحث عن منتج..." oninput="renderProducts()"><div id="cats" class="cats"></div><div id="products" class="products"></div></section><aside class="card"><h2>فاتورة جديدة</h2><input id="customer" class="field" placeholder="اسم الزبون اختياري"><div id="cart" style="margin-top:10px"></div><div class="row" style="margin-top:14px"><b>الإجمالي</b><b class="price" id="total">0</b></div><div class="actions" style="margin-top:12px"><button class="btn green" onclick="saveInvoice()">حفظ الفاتورة</button><button class="btn gray" onclick="printCurrent()">طباعة</button><button class="btn gray" onclick="downloadCurrent()">حفظ كصورة</button><button class="btn red" onclick="clearCart()">تفريغ</button></div><div id="invoiceBox" style="margin-top:14px;display:flex;justify-content:center"></div></aside></div></div><nav class="bottom"><a href="admin.html">إدارة</a><a href="tables.html">طاولات</a><a href="kitchen.html">مطبخ</a><a class="active" href="cashier.html">كاشير</a><a href="reports.html">تقارير</a></nav><script src="firebase.js"></script><script>
if(!R7F.requireAdmin()) throw new Error('login');let settings=R7F.settingsWithDefaults(null),categories={},products={},activeCat='all',cart=[],lastInvoice=null;const $=id=>document.getElementById(id);function toast(m,t=''){const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3500)}function esc(s){return R7F.escapeHtml(s)}function renderCats(){const arr=R7F.list(categories).filter(c=>c.active!==false).sort(R7F.sortBySort);$('cats').innerHTML='<button class="cat '+(activeCat==='all'?'active':'')+'" onclick="activeCat=\'all\';renderProducts()">الكل</button>'+arr.map(c=>`<button class="cat ${activeCat===c.id?'active':''}" onclick="activeCat='${esc(c.id)}';renderProducts()">${esc(c.name)}</button>`).join('')}function renderProducts(){document.documentElement.style.setProperty('--brand',settings.themeColor);renderCats();const q=$('search').value.trim().toLowerCase();let arr=R7F.list(products).filter(p=>p.active!==false).sort(R7F.sortBySort);if(activeCat!=='all')arr=arr.filter(p=>p.categoryId===activeCat);if(q)arr=arr.filter(p=>(p.name||'').toLowerCase().includes(q));$('products').innerHTML=arr.map(p=>`<button class="prod" onclick="add('${esc(p.id)}')"><div class="prodImg">${p.image?`<img src="${esc(p.image)}">`:R7F.icon(p.icon||'products',34)}</div><h3>${esc(p.name)}</h3><div class="price">${R7F.money(p.price,settings.currency)}</div></button>`).join('')||'<div class="card">لا توجد منتجات</div>'}function add(id){const p=products[id];const ex=cart.find(i=>i.id===id);if(ex)ex.qty++;else cart.push({id,name:p.name,price:Number(p.price||0),qty:1});renderCart()}function renderCart(){$('cart').innerHTML=cart.length?cart.map((i,idx)=>`<div class="cartItem"><div><b>${esc(i.name)}</b><div class="price">${R7F.money(i.price,settings.currency)}</div></div><div class="qty"><button onclick="cart[${idx}].qty=Math.max(1,cart[${idx}].qty-1);renderCart()">-</button><b>${i.qty}</b><button onclick="cart[${idx}].qty++;renderCart()">+</button><button onclick="cart.splice(${idx},1);renderCart()">×</button></div></div>`).join(''):'<div style="color:#64748b;font-weight:900;text-align:center;padding:18px">لم يتم اختيار أصناف</div>';$('total').textContent=R7F.money(R7F.totals(cart,settings).total,settings.currency);renderInvoicePreview()}function invoiceHtml(inv){return R7F.invoiceHtml(inv,'thermalInvoice',settings)}function renderInvoicePreview(){const inv=lastInvoice||{invoiceNo:'مسودة',items:cart,createdAt:Date.now()};$('invoiceBox').innerHTML=invoiceHtml(inv)}async function saveInvoice(){if(!cart.length)return toast('اختر منتجات أولاً','err');try{const t=R7F.totals(cart,settings);const inv={invoiceNo:R7F.orderNo('CSH'),source:'cashier',channel:'cashier',status:'delivered',customer:{name:$('customer').value.trim()},items:cart.map(x=>({...x})),subtotal:t.subtotal,service:t.service,tax:t.tax,total:t.total,createdAt:Date.now(),deliveredAt:Date.now(),updatedAt:R7F.now()};await R7F.push('invoices',inv);lastInvoice=inv;toast('تم حفظ الفاتورة وتسجيلها في التقارير');renderInvoicePreview()}catch(e){toast(R7F.errorMessage(e),'err')}}function clearCart(){cart=[];lastInvoice=null;$('customer').value='';renderCart()}function printCurrent(){R7F.printElement('print_thermalInvoice')}async function downloadCurrent(){try{await R7F.ensureHtml2Canvas();const el=document.getElementById('print_thermalInvoice');const canvas=await html2canvas(el,{backgroundColor:'#ffffff',scale:2});R7F.downloadDataUrl(canvas.toDataURL('image/png'),'cashier-invoice.png')}catch(e){toast(R7F.errorMessage(e),'err')}}R7F.ready().then(()=>{R7F.watch('settings',v=>{settings=R7F.settingsWithDefaults(v);renderProducts();renderCart()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('categories',v=>{categories=v||{};renderProducts()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('products',v=>{products=v||{};renderProducts()},e=>toast(R7F.errorMessage(e),'err'))}).catch(e=>toast(R7F.errorMessage(e),'err'));renderCart();
</script></body></html>
