<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>التقارير والفواتير</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>
:root{--brand:#EA580B;--ink:#0f172a;--muted:#64748b;--line:#e5e7eb;--shadow:0 16px 42px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:#f8fafc;color:var(--ink);font-family:'Cairo',Tahoma,Arial,sans-serif}button,input{font-family:inherit}.wrap{width:min(1240px,100%);margin:auto;padding:22px 16px 110px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}.top h1{margin:0}.card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:16px;box-shadow:var(--shadow);margin-bottom:16px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat b{font-size:28px;color:var(--brand)}.filters{display:flex;gap:8px;flex-wrap:wrap}.field{border:1px solid var(--line);background:#f8fafc;border-radius:16px;padding:12px;outline:none;font-weight:800}.btn{border:0;border-radius:17px;background:var(--brand);color:#fff;padding:12px 16px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;gap:8px;align-items:center}.btn.gray{background:#f1f5f9;color:#334155}.btn.green{background:#16a34a}.btn.red{background:#fee2e2;color:#991b1b}.actions{display:flex;gap:8px;flex-wrap:wrap}.invoices{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.invCard{background:#fff;border:1px solid var(--line);border-radius:26px;padding:14px;box-shadow:var(--shadow)}.muted{color:var(--muted);font-weight:800}.pill{display:inline-flex;border-radius:999px;padding:4px 10px;background:#f1f5f9;color:#475569;font-weight:900;font-size:12px}.invoice{width:280px;background:#fff;color:#111;padding:12px;border:1px solid #ddd;font-family:'Cairo',Tahoma,Arial}.invoice .center{text-align:center}.invoice .line{border-top:1px dashed #999;margin:8px 0}.invoice .irow{display:flex;justify-content:space-between;gap:8px;padding:4px 0}.modal{position:fixed;inset:0;background:rgba(2,6,23,.55);z-index:80;display:none}.modal.show{display:grid;place-items:center}.panel{width:min(720px,calc(100% - 24px));max-height:90vh;overflow:auto;background:#fff;border-radius:28px;padding:18px}.editRow{display:grid;grid-template-columns:1fr 90px 100px 40px;gap:8px;margin-bottom:8px}.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom));display:none;z-index:60;justify-content:space-around}.bottom a{color:#64748b;text-decoration:none;font-weight:900;text-align:center;border-radius:16px;padding:8px}.bottom .active{background:#fff7ed;color:var(--brand)}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;width:min(520px,calc(100% - 28px));padding:14px;border-radius:18px;background:#111827;color:white;font-weight:900;text-align:center;display:none}.toast.show{display:block}.toast.err{background:#b91c1c}@media(max-width:1050px){.invoices{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(2,1fr)}.bottom{display:flex}}@media(max-width:620px){.invoices,.stats{grid-template-columns:1fr}.editRow{grid-template-columns:1fr 70px 80px 38px}.filters .field,.filters .btn{flex:1}}
</style></head><body><div id="toast" class="toast"></div><div class="wrap"><div class="top"><div><h1>التقارير والفواتير</h1><div class="muted">المبيعات تُحسب من الفواتير المسلّمة فقط، وليس عند إنشاء الطلب</div></div><div class="actions"><a class="btn gray" href="admin.html">الإدارة</a><a class="btn gray" href="cashier.html">الكاشير</a></div></div><div class="card"><div class="filters"><input id="from" type="date" class="field" onchange="render()"><input id="to" type="date" class="field" onchange="render()"><input id="q" class="field" placeholder="بحث برقم الفاتورة" oninput="render()"><button class="btn gray" onclick="clearFilters()">كل الفواتير</button></div></div><div class="stats"><div class="card stat">عدد الفواتير<br><b id="count">0</b></div><div class="card stat">المبيعات<br><b id="sales">0</b></div><div class="card stat">الأصناف<br><b id="itemsCount">0</b></div><div class="card stat">متوسط الفاتورة<br><b id="avg">0</b></div></div><div class="card"><h2>أعلى الأصناف</h2><div id="topItems" class="muted"></div></div><div id="invoices" class="invoices"></div></div><div id="modal" class="modal" onclick="if(event.target.id==='modal')closeEdit()"><div class="panel"><div style="display:flex;justify-content:space-between;align-items:center"><h2>تعديل الفاتورة</h2><button class="btn gray" onclick="closeEdit()">إغلاق</button></div><input id="editId" type="hidden"><label>رقم الفاتورة</label><input id="eNo" class="field" style="width:100%;margin-bottom:8px"><label>اسم الزبون</label><input id="eCustomer" class="field" style="width:100%;margin-bottom:12px"><div id="editItems"></div><button class="btn gray" onclick="addEditItem()">إضافة صنف</button><div style="margin-top:12px"><b>الإجمالي الجديد: <span id="editTotal"></span></b></div><div class="actions" style="margin-top:12px"><button class="btn" onclick="saveEdit()">حفظ وإعادة الحساب</button></div></div></div><nav class="bottom"><a href="admin.html">إدارة</a><a href="tables.html">طاولات</a><a href="kitchen.html">مطبخ</a><a href="cashier.html">كاشير</a><a class="active" href="reports.html">تقارير</a></nav><script src="firebase.js"></script><script>
if(!R7F.requireAdmin()) throw new Error('login');let settings=R7F.settingsWithDefaults(null),invoices={};const $=id=>document.getElementById(id);function toast(m,t=''){const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3500)}function esc(s){return R7F.escapeHtml(s)}function passFilter(inv){const f=$('from').value?new Date($('from').value).setHours(0,0,0,0):0;const t=$('to').value?new Date($('to').value).setHours(23,59,59,999):Infinity;const d=Number(inv.deliveredAt||inv.createdAt||0);const q=$('q').value.trim().toLowerCase();return d>=f&&d<=t&&(!q||String(inv.invoiceNo||'').toLowerCase().includes(q))}function invoiceHtml(inv,id){const t=R7F.totals(inv.items||[],settings);return `<div class="invoice" id="print_${id}"><div class="center"><h2 style="margin:0">${esc(settings.name||'فاتورة')}</h2><div>${esc(inv.invoiceNo||id)}</div><div>${R7F.localDate(inv.deliveredAt||inv.createdAt)}</div></div><div class="line"></div>${(inv.items||[]).map(i=>`<div class="irow"><span>${esc(i.name)} × ${i.qty}</span><b>${R7F.money(Number(i.qty)*Number(i.price),settings.currency)}</b></div>`).join('')}<div class="line"></div><div class="irow"><span>المجموع</span><b>${R7F.money(t.subtotal,settings.currency)}</b></div>${t.service?`<div class="irow"><span>خدمة</span><b>${R7F.money(t.service,settings.currency)}</b></div>`:''}${t.tax?`<div class="irow"><span>ضريبة</span><b>${R7F.money(t.tax,settings.currency)}</b></div>`:''}<div class="irow"><span>الإجمالي</span><b>${R7F.money(t.total,settings.currency)}</b></div><div class="line"></div><div class="center">شكراً لزيارتكم</div></div>`}function render(){document.documentElement.style.setProperty('--brand',settings.themeColor);const arr=R7F.list(invoices).filter(i=>(i.status||'delivered')==='delivered').filter(passFilter).sort((a,b)=>Number(b.deliveredAt||b.createdAt||0)-Number(a.deliveredAt||a.createdAt||0));let sales=0,itemsCount=0,top={};arr.forEach(inv=>{const t=R7F.totals(inv.items||[],settings);sales+=t.total;(inv.items||[]).forEach(i=>{itemsCount+=Number(i.qty||0);top[i.name]=(top[i.name]||0)+Number(i.qty||0)})});$('count').textContent=arr.length;$('sales').textContent=R7F.money(sales,settings.currency);$('itemsCount').textContent=itemsCount;$('avg').textContent=R7F.money(arr.length?sales/arr.length:0,settings.currency);$('topItems').innerHTML=Object.entries(top).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([n,q])=>`<span class="pill">${esc(n)}: ${q}</span>`).join(' ')||'لا توجد بيانات';$('invoices').innerHTML=arr.map(inv=>`<div class="invCard"><div style="display:flex;justify-content:space-between;gap:8px"><div><h3 style="margin:0">${esc(inv.invoiceNo||inv.id)}</h3><div class="muted">${R7F.localDate(inv.deliveredAt||inv.createdAt)}</div><span class="pill">${R7F.channelLabel(inv.channel||inv.source)}</span></div><b class="price">${R7F.money(R7F.totals(inv.items||[],settings).total,settings.currency)}</b></div><div style="margin:12px 0;display:flex;justify-content:center">${invoiceHtml(inv,inv.id)}</div><div class="actions"><button class="btn gray" onclick="R7F.printElement('print_${inv.id}')">طباعة</button><button class="btn gray" onclick="downloadInv('${inv.id}')">صورة</button><button class="btn" onclick="editInv('${inv.id}')">تعديل</button><button class="btn red" onclick="deleteInv('${inv.id}')">حذف</button></div></div>`).join('')||'<div class="card">لا توجد فواتير في هذه الفترة.</div>'}async function downloadInv(id){try{await R7F.ensureHtml2Canvas();const canvas=await html2canvas(document.getElementById('print_'+id),{backgroundColor:'#fff',scale:2});R7F.downloadDataUrl(canvas.toDataURL('image/png'),(invoices[id].invoiceNo||id)+'.png')}catch(e){toast(R7F.errorMessage(e),'err')}}function editInv(id){const inv=invoices[id];$('editId').value=id;$('eNo').value=inv.invoiceNo||id;$('eCustomer').value=(inv.customer||{}).name||'';$('editItems').innerHTML=(inv.items||[]).map(i=>editRow(i)).join('');$('modal').classList.add('show');calcEdit()}function editRow(i={}){return `<div class="editRow"><input class="field eName" placeholder="الصنف" value="${esc(i.name||'')}"><input class="field eQty" type="number" placeholder="كمية" value="${Number(i.qty||1)}" oninput="calcEdit()"><input class="field ePrice" type="number" step="0.01" placeholder="سعر" value="${Number(i.price||0)}" oninput="calcEdit()"><button class="btn red" onclick="this.closest('.editRow').remove();calcEdit()">×</button></div>`}function addEditItem(){$('editItems').insertAdjacentHTML('beforeend',editRow({qty:1,price:0}));calcEdit()}function readEditItems(){return [...document.querySelectorAll('.editRow')].map(r=>({name:r.querySelector('.eName').value.trim(),qty:Number(r.querySelector('.eQty').value||1),price:Number(r.querySelector('.ePrice').value||0)})).filter(i=>i.name)}function calcEdit(){const t=R7F.totals(readEditItems(),settings);$('editTotal').textContent=R7F.money(t.total,settings.currency)}async function saveEdit(){try{const id=$('editId').value,items=readEditItems(),t=R7F.totals(items,settings);await R7F.update('invoices/'+id,{invoiceNo:$('eNo').value.trim(),customer:{name:$('eCustomer').value.trim()},items,subtotal:t.subtotal,service:t.service,tax:t.tax,total:t.total,updatedAt:R7F.now()});closeEdit();toast('تم تعديل الفاتورة وإعادة الحساب')}catch(e){toast(R7F.errorMessage(e),'err')}}function closeEdit(){$('modal').classList.remove('show')}async function deleteInv(id){if(!confirm('حذف الفاتورة؟ سيتم إعادة حساب التقارير بدونها.'))return;try{await R7F.remove('invoices/'+id);toast('تم حذف الفاتورة')}catch(e){toast(R7F.errorMessage(e),'err')}}function clearFilters(){$('from').value='';$('to').value='';$('q').value='';render()}R7F.ready().then(()=>{R7F.watch('settings',v=>{settings=R7F.settingsWithDefaults(v);render()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('invoices',v=>{invoices=v||{};render()},e=>toast(R7F.errorMessage(e),'err'))}).catch(e=>toast(R7F.errorMessage(e),'err'));
</script></body></html>
