<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>التقارير والفواتير - R7 Burger</title><style>
*{box-sizing:border-box}body{margin:0;background:#eef1f6;color:#111827;font-family:Tahoma,Arial,sans-serif}button,input,textarea{font:inherit}button{cursor:pointer;border:0}.app{max-width:1100px;margin:auto;min-height:100vh;background:#f8fafc}.top{position:sticky;top:0;background:white;z-index:20;border-bottom:1px solid #eef0f4;padding:14px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;gap:12px;align-items:center}.logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,#ea580c,#fb923c);color:#fff;display:grid;place-items:center;font-weight:900}h1{margin:0;font-size:22px}.sub{color:#64748b;font-size:12px;font-weight:800}.nav{display:flex;gap:8px;overflow:auto;padding:12px 14px;background:#fff;border-bottom:1px solid #eef0f4}.nav a,.nav button{white-space:nowrap;text-decoration:none;background:#fff7ed;color:#9a3412;padding:11px 14px;border-radius:16px;font-weight:900}.wrap{padding:16px;display:grid;gap:16px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:#fff;border:1px solid #eef0f4;border-radius:28px;padding:18px;box-shadow:0 18px 45px rgba(15,23,42,.07)}.stat b{font-size:28px;color:#ea580c}.stat span{display:block;color:#64748b;font-weight:800;margin-top:4px}.field{width:100%;border:1px solid #e5e7eb;background:#f8fafc;border-radius:17px;padding:13px;margin:7px 0 12px;outline:none}.primary{border-radius:17px;padding:13px 16px;background:#ea580c;color:#fff;font-weight:900}.secondary{border-radius:17px;padding:13px 16px;background:#111827;color:#fff;font-weight:900}.danger{border-radius:14px;padding:10px 12px;background:#fee2e2;color:#991b1b;font-weight:900}.ghost{border-radius:14px;padding:10px 12px;background:#f3f4f6;color:#111827;font-weight:900}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid #eef0f4;padding:10px;text-align:right;font-size:13px}.table th{color:#64748b}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.alert{padding:14px;border-radius:18px;margin-bottom:12px;font-weight:800;line-height:1.8;background:#fee2e2;color:#991b1b}.hidden{display:none}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;max-width:620px;width:calc(100% - 34px);padding:16px;border-radius:20px;background:#111827;color:white;font-weight:900;text-align:center;display:none;line-height:1.8}.toast.show{display:block}.toast.err{background:#b91c1c}.invoice{font-family:Tahoma,Arial,sans-serif;direction:rtl}.invoice h2{text-align:center;margin:0 0 6px}.invoice .line{border-top:1px dashed #000;margin:8px 0}.invoice table{width:100%;border-collapse:collapse;font-size:12px}.invoice td{padding:4px 0}.muted{color:#64748b;font-size:12px;line-height:1.7;font-weight:700}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:560px){.grid{grid-template-columns:1fr}.wrap{padding:12px}.card{border-radius:24px}}
</style></head><body><div id="toast" class="toast"></div><div class="app"><header class="top"><div class="brand"><div class="logo">R7</div><div><h1>التقارير والفواتير</h1><div class="sub">مبيعات، طلبات، وفواتير حرارية</div></div></div><button class="danger" onclick="R7F.logout()">خروج</button></header><nav class="nav"><a href="admin.html">الإدارة</a><a href="tables.html">الطاولات</a><a href="kitchen.html">المطبخ</a><button id="refresh">تحديث</button></nav><main class="wrap"><div id="err" class="alert hidden"></div><section class="card"><h2>الفترة</h2><div class="row"><input id="from" class="field" type="date" style="max-width:180px"><input id="to" class="field" type="date" style="max-width:180px"><button class="primary" onclick="render()">تطبيق</button></div></section><section class="grid"><div class="card stat"><b id="sales">0</b><span>إجمالي المبيعات</span></div><div class="card stat"><b id="count">0</b><span>عدد الطلبات</span></div><div class="card stat"><b id="avg">0</b><span>متوسط الطلب</span></div><div class="card stat"><b id="newOrders">0</b><span>طلبات جديدة</span></div></section><section class="card"><h2>إنشاء طلب واتساب يدوي</h2><div class="grid"><input id="mName" class="field" placeholder="اسم الزبون"><input id="mPhone" class="field" placeholder="رقم الجوال"><input id="mTotal" class="field" type="number" placeholder="الإجمالي"><input id="mItems" class="field" placeholder="الأصناف نصياً"></div><textarea id="mNote" class="field" placeholder="ملاحظة" rows="2"></textarea><button id="manual" class="primary">حفظ الطلب وإرسال واتساب</button></section><section class="card"><h2>أعلى الأصناف</h2><table class="table"><thead><tr><th>الصنف</th><th>الكمية</th><th>المبيعات</th></tr></thead><tbody id="topItems"></tbody></table></section><section class="card"><h2>الطلبات</h2><table class="table"><thead><tr><th>الرقم</th><th>المصدر</th><th>الحالة</th><th>التاريخ</th><th>الإجمالي</th><th>إجراء</th></tr></thead><tbody id="ordersRows"></tbody></table></section></main></div><script src="firebase.js"></script><script>
if(!R7F.requireAdmin()) throw new Error('login');const $=id=>document.getElementById(id),esc=R7F.escapeHtml;let settings={...R7F.FALLBACK_SETTINGS},orders=[];function toast(m,t='') {const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3500)}function showErr(e){$('err').textContent=R7F.errorMessage(e);$('err').classList.remove('hidden')}function statusText(s){return s==='preparing'?'قيد التحضير':s==='ready'?'جاهز':s==='done'?'تم التسليم':s==='cancelled'?'ملغي':'جديد'}function filtered(){const f=$('from').value?new Date($('from').value+'T00:00:00').getTime():0,t=$('to').value?new Date($('to').value+'T23:59:59').getTime():Date.now()+86400000;return orders.filter(o=>{const d=R7F.toMillis(o.createdAt)||0;return d>=f&&d<=t&&o.status!=='cancelled'})}function render(){const arr=filtered().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)),total=arr.reduce((a,b)=>a+Number(b.total||0),0);$('sales').textContent=R7F.money(total,settings.currency);$('count').textContent=arr.length;$('avg').textContent=R7F.money(arr.length?total/arr.length:0,settings.currency);$('newOrders').textContent=arr.filter(o=>(o.status||'new')==='new').length;const top={};arr.forEach(o=>(o.items||[]).forEach(i=>{if(!top[i.name])top[i.name]={qty:0,sales:0};top[i.name].qty+=Number(i.qty||1);top[i.name].sales+=Number(i.price||0)*Number(i.qty||1)}));$('topItems').innerHTML=Object.entries(top).sort((a,b)=>b[1].sales-a[1].sales).map(([name,v])=>`<tr><td>${esc(name)}</td><td>${v.qty}</td><td>${R7F.money(v.sales,settings.currency)}</td></tr>`).join('')||'<tr><td colspan="3" class="muted">لا توجد بيانات</td></tr>';$('ordersRows').innerHTML=arr.map(o=>`<tr><td>${esc(o.orderNo||o.id)}</td><td>${o.table?'طاولة '+esc(o.table):'واتساب'}</td><td>${statusText(o.status)}</td><td>${R7F.localDate(o.createdAt)}</td><td>${R7F.money(o.total,settings.currency)}</td><td><button class="ghost" onclick="printInvoice('${esc(o.id)}')">فاتورة</button></td></tr>`).join('')||'<tr><td colspan="6" class="muted">لا توجد طلبات</td></tr>'}function printInvoice(id){const o=orders.find(x=>x.id===id);if(!o)return;const w=open('','_blank');w.document.write(`<html dir="rtl"><head><title>فاتورة ${esc(o.orderNo)}</title><style>@page{size:80mm auto;margin:3mm}body{font-family:Tahoma,Arial,sans-serif;width:72mm;margin:0 auto;color:#000}.center{text-align:center}.line{border-top:1px dashed #000;margin:8px 0}table{width:100%;border-collapse:collapse;font-size:12px}td{padding:4px 0}.total{font-size:18px;font-weight:bold}</style></head><body><div class="center"><h2>${esc(settings.name||'R7 Burger')}</h2><div>${esc(settings.slogan||'')}</div></div><div class="line"></div><div>رقم: ${esc(o.orderNo||o.id)}</div><div>${o.table?'طاولة: '+esc(o.table):'طلب واتساب'}</div><div>التاريخ: ${R7F.localDate(o.createdAt)}</div><div class="line"></div><table>${(o.items||[]).map(i=>`<tr><td>${esc(i.name)} × ${Number(i.qty||1)}</td><td style="text-align:left">${R7F.money(Number(i.price||0)*Number(i.qty||1),settings.currency)}</td></tr>`).join('')}</table><div class="line"></div><div class="total">الإجمالي: ${R7F.money(o.total,settings.currency)}</div><div class="line"></div><div class="center">شكراً لزيارتكم</div><script>setTimeout(()=>print(),500)<\/script></body></html>`);w.document.close()}$('manual').onclick=async()=>{const total=Number($('mTotal').value||0),itemsText=$('mItems').value.trim();if(!total||!itemsText)return toast('اكتب الأصناف والإجمالي','err');const order={orderNo:R7F.orderNo(),source:'whatsapp',table:'',customerName:$('mName').value.trim(),phone:$('mPhone').value.trim(),note:$('mNote').value.trim(),items:[{name:itemsText,qty:1,price:total}],total,status:'new',createdAt:R7F.now(),updatedAt:R7F.now()};try{await R7F.push('orders',order);toast('تم حفظ الطلب','ok');if(settings.whatsapp)window.open('https://wa.me/'+settings.whatsapp+'?text='+encodeURIComponent('طلب جديد '+order.orderNo+'\n'+itemsText+'\nالإجمالي: '+total),'_blank');['mName','mPhone','mTotal','mItems','mNote'].forEach(i=>$(i).value='')}catch(e){showErr(e);toast(R7F.errorMessage(e),'err')}};window.render=render;window.printInvoice=printInvoice;$('refresh').onclick=render;R7F.ready().then(()=>{R7F.watch('settings',v=>{settings={...R7F.FALLBACK_SETTINGS,...(v||{})};render()},showErr);R7F.watch('orders',v=>{orders=R7F.list(v||{});render()},showErr)}).catch(showErr);
</script></body></html>
