<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>شاشة المطبخ - R7 Burger</title><style>
*{box-sizing:border-box}body{margin:0;background:#0f172a;color:#111827;font-family:Tahoma,Arial,sans-serif}button{font:inherit;cursor:pointer;border:0}.app{max-width:1100px;margin:auto;min-height:100vh;background:#f8fafc}.top{position:sticky;top:0;z-index:20;background:#111827;color:white;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,#ea580c,#fb923c);display:grid;place-items:center;font-weight:900;font-size:20px}h1{margin:0;font-size:22px}.sub{color:#cbd5e1;font-size:12px;font-weight:800}.bell{position:relative;border-radius:18px;background:#ea580c;color:white;padding:13px 18px;font-weight:900}.badge{position:absolute;top:-8px;right:-8px;background:#dc2626;color:white;border:3px solid #111827;border-radius:999px;min-width:28px;height:28px;display:grid;place-items:center;font-size:13px}.nav{display:flex;gap:8px;overflow:auto;padding:12px 14px;background:white;border-bottom:1px solid #eef0f4}.nav a,.nav button{white-space:nowrap;text-decoration:none;background:#fff7ed;color:#9a3412;padding:11px 14px;border-radius:16px;font-weight:900}.wrap{padding:16px}.orders{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}.order{background:white;border:1px solid #eef0f4;border-radius:28px;padding:16px;box-shadow:0 18px 45px rgba(15,23,42,.08);border-top:8px solid #ea580c}.order.preparing{border-top-color:#f59e0b}.order.ready{border-top-color:#16a34a}.head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.no{font-size:20px;font-weight:900}.pill{border-radius:999px;padding:7px 12px;font-size:12px;font-weight:900;background:#fee2e2;color:#991b1b}.pill.preparing{background:#fef3c7;color:#92400e}.pill.ready{background:#dcfce7;color:#166534}.meta{color:#64748b;font-size:13px;line-height:1.8;font-weight:800;margin:8px 0}.items{border-top:1px dashed #cbd5e1;border-bottom:1px dashed #cbd5e1;margin:12px 0;padding:10px 0;display:grid;gap:8px}.item{display:flex;justify-content:space-between;font-weight:900}.note{background:#fff7ed;color:#9a3412;border-radius:16px;padding:10px;font-weight:800;line-height:1.7}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.primary{border-radius:14px;padding:11px 12px;background:#ea580c;color:#fff;font-weight:900}.warn{border-radius:14px;padding:11px 12px;background:#f59e0b;color:#fff;font-weight:900}.ok{border-radius:14px;padding:11px 12px;background:#16a34a;color:#fff;font-weight:900}.danger{border-radius:14px;padding:11px 12px;background:#fee2e2;color:#991b1b;font-weight:900}.empty{text-align:center;color:#64748b;font-weight:900;padding:60px}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;max-width:620px;width:calc(100% - 34px);padding:16px;border-radius:20px;background:#111827;color:white;font-weight:900;text-align:center;display:none;line-height:1.8}.toast.show{display:block}.toast.err{background:#b91c1c}.alert{padding:14px;border-radius:18px;margin:16px;font-weight:800;line-height:1.8;background:#fee2e2;color:#991b1b}.hidden{display:none}
</style></head><body><div id="toast" class="toast"></div><div class="app"><header class="top"><div class="brand"><div class="logo">R7</div><div><h1>شاشة المطبخ</h1><div class="sub">الطلبات الجديدة تنزل مباشرة من المنيو</div></div></div><button id="bell" class="bell">طلبات جديدة <span id="newCount" class="badge">0</span></button></header><nav class="nav"><a href="admin.html">الإدارة</a><a href="tables.html">الطاولات</a><a href="reports.html">التقارير</a><button id="sound">تفعيل التنبيه</button><button class="danger" onclick="R7F.logout()">خروج</button></nav><div id="err" class="alert hidden"></div><main class="wrap"><div id="orders" class="orders"><div class="empty">جاري تحميل الطلبات...</div></div></main></div><script src="firebase.js"></script><script>
if(!R7F.requireAdmin()) throw new Error('login');const $=id=>document.getElementById(id),esc=R7F.escapeHtml;let settings={...R7F.FALLBACK_SETTINGS},orders=[],lastNew=0,soundOn=false;function toast(m,t='') {const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3500)}function showErr(e){$('err').textContent=R7F.errorMessage(e);$('err').classList.remove('hidden')}function statusText(s){return s==='preparing'?'قيد التحضير':s==='ready'?'جاهز':s==='done'?'تم التسليم':s==='cancelled'?'ملغي':'جديد'}function beep(){if(!soundOn)return;try{const a=new (window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.value=.08;o.start();setTimeout(()=>{o.stop();a.close()},180)}catch(e){}}function render(){const active=orders.filter(o=>!['done','cancelled'].includes(o.status)).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));const n=active.filter(o=>(o.status||'new')==='new').length;if(n>lastNew&&lastNew!==0){beep();toast('وصل طلب جديد')}lastNew=n;$('newCount').textContent=n;$('orders').innerHTML=active.map(o=>`<div class="order ${esc(o.status||'new')}"><div class="head"><div><div class="no">${esc(o.orderNo||o.id)}</div><div class="meta">${o.table?'طاولة '+esc(o.table):'طلب واتساب / خارج المطعم'}<br>${R7F.localDate(o.createdAt)}</div></div><span class="pill ${esc(o.status||'new')}">${statusText(o.status)}</span></div><div class="items">${(o.items||[]).map(i=>`<div class="item"><span>${esc(i.name)} × ${Number(i.qty||1)}</span><span>${R7F.money(Number(i.price||0)*Number(i.qty||1),settings.currency)}</span></div>`).join('')}</div><div class="meta"><b>المجموع:</b> ${R7F.money(o.total,settings.currency)} ${o.customerName?'<br><b>الاسم:</b> '+esc(o.customerName):''} ${o.phone?'<br><b>الهاتف:</b> '+esc(o.phone):''}</div>${o.note?`<div class="note">${esc(o.note)}</div>`:''}<div class="actions"><button class="primary" onclick="setStatus('${esc(o.id)}','preparing')">استلام / تحضير</button><button class="warn" onclick="setStatus('${esc(o.id)}','ready')">جاهز</button><button class="ok" onclick="setStatus('${esc(o.id)}','done')">تم التسليم</button><button class="danger" onclick="setStatus('${esc(o.id)}','cancelled')">إلغاء</button></div></div>`).join('')||'<div class="empty">لا توجد طلبات نشطة الآن</div>'}async function setStatus(id,status){try{await R7F.update('orders/'+id,{status,updatedAt:R7F.now()});toast('تم تحديث الطلب')}catch(e){showErr(e);toast(R7F.errorMessage(e),'err')}}window.setStatus=setStatus;$('sound').onclick=()=>{soundOn=true;toast('تم تفعيل صوت التنبيه')};R7F.ready().then(()=>{R7F.watch('settings',v=>{settings={...R7F.FALLBACK_SETTINGS,...(v||{})};render()},showErr);R7F.watch('orders',v=>{orders=R7F.list(v||{});render()},showErr)}).catch(showErr);
</script></body></html>
