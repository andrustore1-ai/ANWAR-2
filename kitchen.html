<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>المطبخ</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>
:root{--brand:#EA580B;--ink:#0f172a;--muted:#64748b;--line:#e5e7eb;--soft:#f8fafc;--shadow:0 16px 42px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:#f8fafc;color:var(--ink);font-family:'Cairo',Tahoma,Arial,sans-serif}button{font-family:inherit}.wrap{width:min(1240px,100%);margin:auto;padding:22px 16px 110px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}.top h1{margin:0}.btn{border:0;border-radius:17px;background:var(--brand);color:#fff;padding:12px 16px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px}.btn.gray{background:#fff;color:#334155;border:1px solid var(--line)}.btn.green{background:#16a34a}.btn.red{background:#dc2626}.btn.blue{background:#2563eb}.actions{display:flex;gap:8px;flex-wrap:wrap}.filters{display:flex;gap:8px;overflow:auto;margin:0 0 14px}.filterBtn{border:0;border-radius:18px;background:#fff;color:#475569;padding:12px 16px;font-weight:900;white-space:nowrap;cursor:pointer;border:1px solid var(--line)}.filterBtn.active{background:var(--brand);color:#fff;border-color:var(--brand)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.stat{background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:var(--shadow)}.stat b{font-size:28px;color:var(--brand)}.orders{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.order{background:#fff;border:1px solid var(--line);border-radius:28px;padding:16px;box-shadow:var(--shadow)}.order.new{border-color:#fed7aa}.order.preparing{border-color:#bfdbfe}.order.ready{border-color:#bbf7d0}.orderHead{display:flex;justify-content:space-between;gap:10px;align-items:center}.pill{border-radius:999px;padding:5px 11px;font-weight:900;font-size:12px;background:#f1f5f9;color:#475569}.items{margin:12px 0;border-top:1px dashed #e2e8f0}.item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #e2e8f0;font-weight:800}.muted{color:var(--muted);font-weight:800}.bell{position:relative}.badge{position:absolute;top:-8px;right:-8px;background:#ef4444;color:white;min-width:25px;height:25px;border-radius:999px;border:3px solid #fff;display:grid;place-items:center;font-size:12px}.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom));display:none;z-index:60;justify-content:space-around}.bottom a{color:#64748b;text-decoration:none;font-weight:900;text-align:center;border-radius:16px;padding:8px}.bottom .active{background:#fff7ed;color:var(--brand)}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;width:min(520px,calc(100% - 28px));padding:14px;border-radius:18px;background:#111827;color:white;font-weight:900;text-align:center;display:none}.toast.show{display:block}.toast.err{background:#b91c1c}@media(max-width:1000px){.orders{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(2,1fr)}.bottom{display:flex}}@media(max-width:620px){.orders,.stats{grid-template-columns:1fr}.order{border-radius:22px}}
</style></head><body><div id="toast" class="toast"></div><div class="wrap"><div class="top"><div><h1>شاشة المطبخ</h1><div class="muted">وضع فاتح، الطلبات الجديدة تظهر لحظياً</div></div><div class="actions"><button class="btn gray bell" onclick="render()"><span id="bellIcon"></span><span id="newBadge" class="badge">0</span></button><a class="btn gray" href="admin.html">الإدارة</a><a class="btn" href="cashier.html">الكاشير</a></div></div><div class="stats"><div class="stat">طلبات جديدة<br><b id="sNew">0</b></div><div class="stat">قيد التحضير<br><b id="sPrep">0</b></div><div class="stat">جاهزة<br><b id="sReady">0</b></div><div class="stat">الإجمالي المفتوح<br><b id="sAll">0</b></div></div><div class="filters" id="kitchenFilters"></div><div id="orders" class="orders"></div></div><nav class="bottom"><a href="admin.html">إدارة</a><a href="tables.html">طاولات</a><a class="active" href="kitchen.html">مطبخ</a><a href="cashier.html">كاشير</a><a href="reports.html">تقارير</a></nav><script src="firebase.js"></script><script>
if(!R7F.requireAdmin()) throw new Error('login');let settings=R7F.settingsWithDefaults(null),orders={},activeStatus='all';const $=id=>document.getElementById(id);function toast(m,t=''){const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3500)}function esc(s){return R7F.escapeHtml(s)}function render(){document.documentElement.style.setProperty('--brand',settings.themeColor);$('bellIcon').innerHTML=R7F.icon('bell');const all=R7F.list(orders).filter(o=>o.channel==='kitchen'&&['new','preparing','ready'].includes(o.status)).sort((a,b)=>Number(a.createdAt||0)-Number(b.createdAt||0));const n=all.filter(o=>o.status==='new').length,p=all.filter(o=>o.status==='preparing').length,r=all.filter(o=>o.status==='ready').length;$('sNew').textContent=n;$('sPrep').textContent=p;$('sReady').textContent=r;$('sAll').textContent=all.length;$('newBadge').textContent=n;$('newBadge').style.display=n?'grid':'none';const filters=[['all','الكل',all.length],['new','طلبات جديدة',n],['preparing','قيد التحضير',p],['ready','جاهزة',r]];$('kitchenFilters').innerHTML=filters.map(f=>`<button class="filterBtn ${activeStatus===f[0]?'active':''}" onclick="activeStatus='${f[0]}';render()">${f[1]} <b>${f[2]}</b></button>`).join('');const arr=activeStatus==='all'?all:all.filter(o=>o.status===activeStatus);$('orders').innerHTML=arr.map(o=>`<div class="order ${esc(o.status)}"><div class="orderHead"><div><h2 style="margin:0">${esc(o.orderNo)}</h2><div class="muted">${o.table?'طاولة '+esc(o.table):'طلب منيو'} · ${R7F.localDate(o.createdAt)}</div></div><span class="pill">${R7F.statusLabel(o.status)}</span></div><div class="items">${(o.items||[]).map(i=>`<div class="item"><span>${esc(i.name)}</span><b>× ${i.qty}</b></div>`).join('')}</div>${o.customer?.name?`<div class="muted">الزبون: ${esc(o.customer.name)}</div>`:''}${o.shippingRegion?`<div class="muted">المنطقة: ${esc(o.shippingRegion)} · توصيل ${R7F.money(o.shippingFee||0,settings.currency)}</div>`:''}${o.note?`<div class="muted">ملاحظة: ${esc(o.note)}</div>`:''}<div class="actions" style="margin-top:12px">${o.status==='new'?`<button class="btn blue" onclick="setStatus('${o.id}','preparing')">استلام / تحضير</button>`:''}${o.status==='preparing'?`<button class="btn green" onclick="setStatus('${o.id}','ready')">جاهز</button>`:''}${o.status==='ready'?`<button class="btn green" onclick="deliver('${o.id}')">تسليم وتسجيل فاتورة</button>`:''}<button class="btn red" onclick="setStatus('${o.id}','cancelled')">إلغاء</button></div></div>`).join('')||'<div class="order"><h2>لا توجد طلبات في هذا التصنيف</h2><div class="muted">عند وصول طلب جديد سيظهر هنا مباشرة مع عداد الإشعار.</div></div>'}async function setStatus(id,status){try{await R7F.update('orders/'+id,{status,updatedAt:R7F.now()});toast('تم التحديث')}catch(e){toast(R7F.errorMessage(e),'err')}}async function deliver(id){try{await R7F.markDelivered(id,orders[id],settings);toast('تم التسليم وتسجيل الفاتورة في التقارير')}catch(e){toast(R7F.errorMessage(e),'err')}}R7F.ready().then(()=>{R7F.watch('settings',v=>{settings=R7F.settingsWithDefaults(v);render()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('orders',v=>{orders=v||{};render()},e=>toast(R7F.errorMessage(e),'err'))}).catch(e=>toast(R7F.errorMessage(e),'err'));
</script></body></html>
