<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>شاشة المطبخ - R7 Burger</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>
:root{--brand:#f97316;--ink:#0f172a;--muted:#64748b;--line:#e5e7eb;--soft:#f8fafc;--shadow:0 16px 42px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:#0f172a;color:#fff;font-family:'Cairo',system-ui,Tahoma,Arial,sans-serif}button{font-family:inherit}.wrap{width:min(1280px,100%);margin:auto;padding:18px 16px 100px}.top{position:sticky;top:0;z-index:40;background:rgba(15,23,42,.88);backdrop-filter:blur(14px);padding:14px 0;border-bottom:1px solid rgba(255,255,255,.08)}.topIn{width:min(1280px,100%);margin:auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}.title{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,var(--brand),#fb923c);display:grid;place-items:center;font-weight:900;overflow:hidden}.logo img{width:100%;height:100%;object-fit:cover}.title h1{margin:0;font-size:26px}.muted{color:#94a3b8;font-weight:800}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:16px;padding:11px 15px;background:var(--brand);color:#fff;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;gap:8px;align-items:center}.btn.gray{background:#334155}.btn.green{background:#16a34a}.btn.red{background:#dc2626}.btn.yellow{background:#f59e0b}.notify{position:relative}.badge{position:absolute;top:-7px;right:-7px;background:#ef4444;border:3px solid #0f172a;color:#fff;border-radius:999px;min-width:26px;height:26px;display:grid;place-items:center;font-size:12px;font-weight:900}.filters{display:flex;gap:8px;overflow:auto;padding:14px 0}.filter{border:1px solid rgba(255,255,255,.12);background:#1e293b;color:#cbd5e1;border-radius:999px;padding:10px 16px;font-weight:900;cursor:pointer;white-space:nowrap}.filter.active{background:var(--brand);color:#fff;border-color:var(--brand)}.board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.order{background:#fff;color:#0f172a;border-radius:28px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08)}.orderHead{padding:16px;background:#f8fafc;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;gap:8px}.orderHead h3{margin:0}.pill{border-radius:999px;padding:6px 11px;font-weight:900;font-size:12px;background:#e2e8f0;color:#334155}.pill.new{background:#fee2e2;color:#991b1b}.pill.preparing{background:#fef3c7;color:#92400e}.pill.ready{background:#dcfce7;color:#166534}.body{padding:16px}.items{display:grid;gap:8px;margin:12px 0}.food{display:flex;justify-content:space-between;gap:8px;border:1px solid #e5e7eb;background:#f8fafc;border-radius:16px;padding:10px;font-weight:900}.note{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:16px;padding:10px;font-weight:800;line-height:1.7}.orderActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.orderActions .btn{justify-content:center}.empty{text-align:center;color:#94a3b8;font-weight:900;padding:60px 12px;border:1px dashed rgba(255,255,255,.16);border-radius:28px;grid-column:1/-1}.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(15,23,42,.94);backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.08);padding:8px 8px calc(8px + env(safe-area-inset-bottom));display:none;z-index:60;justify-content:space-around}.bottom a{color:#94a3b8;text-decoration:none;font-weight:900;text-align:center;border-radius:18px;padding:8px 12px}.bottom a.active{background:#1e293b;color:#fff}.toast{position:fixed;top:86px;left:50%;transform:translateX(-50%);z-index:100;max-width:520px;width:calc(100% - 30px);padding:15px 18px;border-radius:20px;background:#111827;color:#fff;font-weight:900;text-align:center;display:none;line-height:1.8;border:1px solid rgba(255,255,255,.1)}.toast.show{display:block}.toast.err{background:#b91c1c}@media(max-width:1000px){.board{grid-template-columns:repeat(2,1fr)}.bottom{display:flex}.topIn{flex-direction:column;align-items:flex-start}.actions{width:100%}.btn{justify-content:center}}@media(max-width:640px){.board{grid-template-columns:1fr}.title h1{font-size:22px}.wrap{padding:14px 12px 105px}.order{border-radius:24px}}
</style></head><body><div id="toast" class="toast"></div><header class="top"><div class="topIn"><div class="title"><div id="logo" class="logo">R7</div><div><h1>شاشة المطبخ</h1><div class="muted">الطلبات الجديدة تظهر لحظياً، والعداد ينقص عند بدء التحضير</div></div></div><div class="actions"><button class="btn notify" onclick="setFilter('new')"><span id="bellIcon"></span>طلبات جديدة<span id="newCount" class="badge">0</span></button><a class="btn gray" href="admin.html">الإدارة</a><a class="btn gray" href="reports.html">التقارير</a></div></div></header><main class="wrap"><div class="filters"><button class="filter active" data-filter="active">النشطة</button><button class="filter" data-filter="new">جديد</button><button class="filter" data-filter="preparing">قيد التحضير</button><button class="filter" data-filter="ready">جاهز</button><button class="filter" data-filter="all">الكل</button></div><section id="board" class="board"></section></main><nav class="bottom"><a href="admin.html"><span id="homeIcon"></span><br>الإدارة</a><a href="tables.html"><span id="tableIcon"></span><br>الطاولات</a><a class="active" href="kitchen.html"><span id="kitchenIcon"></span><br>المطبخ</a><a href="reports.html"><span id="reportsIcon"></span><br>تقارير</a></nav><script src="firebase.js"></script><script>
if(!R7F.requireAdmin()) throw new Error('login required');let orders={},settings={...R7F.FALLBACK_SETTINGS},filter='active';const $=id=>document.getElementById(id);function toast(m,t=''){const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3200)}function esc(s){return R7F.escapeHtml(s)}function initIcons(){$('bellIcon').innerHTML=R7F.icon('bell',18);$('homeIcon').innerHTML=R7F.icon('home');$('tableIcon').innerHTML=R7F.icon('table');$('kitchenIcon').innerHTML=R7F.icon('kitchen');$('reportsIcon').innerHTML=R7F.icon('reports')}function renderLogo(){document.documentElement.style.setProperty('--brand',settings.themeColor||'#f97316');if(settings.logoImage)$('logo').innerHTML=`<img src="${esc(settings.logoImage)}">`;else $('logo').textContent=settings.logoText||'R7'}function activeKitchenOrders(){return R7F.list(orders).filter(o=>o.routeKitchen!==false&&o.status!=='delivered'&&o.status!=='cancelled')}function render(){renderLogo();const all=R7F.list(orders).filter(o=>o.routeKitchen!==false).sort((a,b)=>R7F.toMillis(a.createdAt)-R7F.toMillis(b.createdAt));const newCount=all.filter(o=>o.status==='new').length;$('newCount').textContent=newCount;let arr=all;if(filter==='active')arr=activeKitchenOrders();else if(filter!=='all')arr=all.filter(o=>o.status===filter);$('board').innerHTML=arr.map(orderCard).join('')||'<div class="empty">لا توجد طلبات في هذا القسم</div>';document.querySelectorAll('.filter').forEach(b=>b.classList.toggle('active',b.dataset.filter===filter))}function orderCard(o){const items=Array.isArray(o.items)?o.items:[];return `<article class="order"><div class="orderHead"><div><h3>${esc(o.orderNo||o.id)}</h3><div class="muted">${o.table?'طاولة '+esc(o.table):R7F.channelLabel(o.channel)} • ${R7F.localDate(o.createdAt)}</div></div><span class="pill ${esc(o.status)}">${R7F.statusLabel(o.status)}</span></div><div class="body"><div class="items">${items.map(i=>`<div class="food"><span>${esc(i.name)}</span><b>x${i.qty}</b></div>`).join('')}</div>${o.note?`<div class="note">ملاحظة: ${esc(o.note)}</div>`:''}<div class="muted">العميل: ${esc(o.customerName||'-')} • الهاتف: ${esc(o.phone||'-')}</div><div class="orderActions">${actionsFor(o)}</div></div></article>`}function actionsFor(o){if(o.status==='new')return `<button class="btn yellow" onclick="setStatus('${esc(o.id)}','preparing')">استلام / تحضير</button><button class="btn red" onclick="setStatus('${esc(o.id)}','cancelled')">إلغاء</button>`;if(o.status==='preparing')return `<button class="btn green" onclick="setStatus('${esc(o.id)}','ready')">جاهز</button><button class="btn red" onclick="setStatus('${esc(o.id)}','cancelled')">إلغاء</button>`;if(o.status==='ready')return `<button class="btn green" onclick="deliver('${esc(o.id)}')">تسليم</button><button class="btn gray" onclick="setStatus('${esc(o.id)}','preparing')">إرجاع للتحضير</button>`;return `<button class="btn gray" onclick="setStatus('${esc(o.id)}','new')">إعادة فتح</button>`}async function setStatus(id,status){try{await R7F.update('orders/'+id,{status,updatedAt:R7F.now()});toast('تم تحديث الطلب')}catch(e){toast(R7F.errorMessage(e),'err')}}async function deliver(id){try{await R7F.update('orders/'+id,{status:'delivered',deliveredAt:R7F.now(),updatedAt:R7F.now()});toast('تم التسليم وتسجيله في التقارير')}catch(e){toast(R7F.errorMessage(e),'err')}}function setFilter(f){filter=f;render()}document.querySelectorAll('.filter').forEach(b=>b.onclick=()=>setFilter(b.dataset.filter));initIcons();R7F.ready().then(()=>{R7F.watch('settings',v=>{settings={...R7F.FALLBACK_SETTINGS,...(v||{})};render()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('orders',v=>{orders=v||{};render()},e=>toast(R7F.errorMessage(e),'err'))}).catch(e=>toast(R7F.errorMessage(e),'err'));
</script></body></html>
